// NOTE: user_id extracted from JWT token
message SellGiftCardRequest {
  string card_type = 1;
  string card_number = 2;
  string card_pin = 3;
  double denomination = 4;
  string currency = 5;
  repeated string images = 6;           // Deprecated: use image_urls instead
  string idempotency_key = 7;
  string transaction_id = 8;            // Unique transaction identifier
  string verification_token = 9;        // Token from TransactionPinService validation
  string provider_name = 10;            // Provider name from GetSellableCards
  // Image upload fields (from UploadSellImage)
  repeated string image_urls = 11;      // URLs of uploaded card images
  repeated string image_keys = 12;      // Storage keys of uploaded images
  // OCR extraction results (from ExtractCardDetails)
  string ocr_brand = 13;
  string ocr_card_number = 14;
  string ocr_pin = 15;
  double ocr_denomination = 16;
  string ocr_currency = 17;
  // Card origin details
  string card_country = 18;             // Country of origin (US, UK, CA, AU, etc.)
  string card_format = 19;              // "ecode" or "physical" — legacy lower-case
  double ocr_confidence = 20;           // OCR confidence score (0-1) from ExtractCardDetails
  // Prestmit-aligned fields (per documentation.prestmit.io):
  // subcategory_id = sellableGiftcards[i].id from rate-calculator-data,
  // sent verbatim as `giftcard_id` to /giftcard-trade/sell/create.
  string subcategory_id = 21;
  // form = "Physical" | "Ecode". Branches the multipart payload:
  // Physical → attachments[]; Ecode → comments=card_code.
  string form = 22;
  // payout_method = name from sellGiftcardPayoutMethods (e.g.
  // "NAIRA", "CEDIS"). Backend also resolves from system_settings
  // when this is empty.
  string payout_method = 23;
  // card_code = explicit Ecode value (replaces card_number/card_pin
  // for Ecode submissions).
  string card_code = 24;
  // disclaimer_accepted MUST be true. The Flutter app gates Submit
  // behind a checkbox; the backend rejects when false to enforce the
  // operator's audit trail of explicit user acceptance.
  bool disclaimer_accepted = 25;
}

message SellGiftCardResponse {
  GiftCardSale sale = 1;
  string message = 2;
}

