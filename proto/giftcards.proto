// ----- Support: Manual operations -----------------------------------

message BulkPerformManualOperationRequest {
  repeated string transaction_ids = 1;       // 1..200; bounds enforced server-side
  string operation = 2;                       // same set as PerformManualOperation
  string reason = 3;
  string notes = 4;
}

message BulkPerformManualOperationResult {
  string transaction_id = 1;
  bool   success = 2;
  string error = 3;     // populated on failure; success rows leave it empty
}

message BulkPerformManualOperationResponse {
  repeated BulkPerformManualOperationResult results = 1;
  int32 succeeded = 2;
  int32 failed = 3;
}

message PerformManualOperationRequest {
  string transaction_id  = 1;
  // Operation key. `refund_sale` is canonical; `reverse_sale` kept as
  // a back-compat alias during the rename rollout. Both route through
  // the three-phase rollback pipeline (verify → refund → reverse
  // settlement) and end at status='refunded'.
  // retry_settlement|manual_payout|refund_sale|reverse_sale|cancel_sale|escalate
  string operation       = 2;
  string reason          = 3;
  string notes           = 4;
  double amount_override = 5;   // used by manual_payout
}

message PerformManualOperationResponse {
  bool   success = 1;
  string message = 2;
  GiftCardSale sale = 3;
}

