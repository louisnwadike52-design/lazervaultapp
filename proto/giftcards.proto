// Buy-side admin transactions — flat projection of the giftcards table.
// Status mirrors the chk_giftcard_status enum:
// pending | available | redeemed | transferred | expired | failed.
message AdminListBuyTransactionsRequest {
  string status = 1;                  // Optional. Empty = all statuses.
  string search = 2;                  // Optional. Matches reference / brand_name / user_id.
  int32 page = 3;                     // 1-based.
  int32 limit = 4;                    // 1..200, default 25.
}

message AdminBuyTransaction {
  string id = 1;
  string user_id = 2;
  string brand_name = 3;
  double original_amount = 4;
  string currency = 5;
  string status = 6;
  string idempotency_key = 7;
  string created_at = 8;              // RFC3339
  string updated_at = 9;              // RFC3339
  string recipient_email = 10;
  string recipient_name = 11;
  // Settlement / FX breakdown — needed by the admin Settlements tab
  // to render per-transaction revenue distribution. All amounts in
  // major units; currency fields name the wallet for each leg.
  string reference = 12;
  double retail_amount = 13;          // What user paid (NGN typically)
  string retail_currency = 14;
  double wholesale_amount = 15;       // Cost from Reloadly (in user's currency)
  string wholesale_currency = 16;
  double commission_amount = 17;      // Our revenue = retail - wholesale
  string commission_currency = 18;
  double sender_amount = 19;          // What Reloadly charged in their wallet (e.g. GBP)
  string sender_currency = 20;
  double fx_rate = 21;                // FX rate sender→retail
  double fee_percentage = 22;
  string completed_at = 23;
  // Operational columns — needed by the admin Transactions table so
  // operators can triage at a glance without drilling in. Mirrors
  // the electricity-bill-payment admin row: Provider, Mode, Token,
  // Refund link, Failover marker, Source.
  string provider_name = 24;          // "reloadly" — buy uses Reloadly only
  string failure_reason = 25;         // Reloadly rejection reason (FAILED/REFUNDED status)
  string redemption_code = 26;        // Reloadly redeem code (preview only — truncate in UI)
  string redemption_pin = 27;         // Reloadly redeem PIN (preview only)
  string provider_transaction_id = 28; // Reloadly transactionId (cross-ref to their dashboard)
  string mode = 29;                   // "sync" | "async" — captures how the buy was processed
  bool   has_refund_entry = 30;       // True iff a refund_ledger row exists for this reference
  // Raw provider request/response captured by a fire-and-forget
  // goroutine after saga completion. Populated for the admin
  // Transaction Detail page; empty if the goroutine hasn't run yet
  // (eventual consistency window is < 1s in practice).
  string request_json           = 31; // pretty-printed JSON; sensitive fields stay because admin-only
  string response_json          = 32;
  int32  provider_http_status   = 33;
  int64  provider_duration_ms   = 34;
}

message AdminListBuyTransactionsResponse {
  repeated AdminBuyTransaction transactions = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

// AdminListRefundLedger surfaces refund_ledger rows for the Refunds
// admin tabs. Returns past + present refunds (any
// confirmation_status, any settlement_status) so operators see the
// full history not just in-flight items. Filterable by `side`
// (buy/sell) so each tab scopes correctly.
message AdminListRefundLedgerRequest {
  string side = 1;          // "buy" | "sell" | "" (both)
  string status = 2;        // optional confirmation_status filter
  int32 page = 3;           // 1-based
  int32 limit = 4;          // 1..200, default 25
}

message AdminRefundLedgerEntry {
  string id = 1;
  string original_reference = 2;
  string refund_reference = 3;
  string user_id = 4;
  string account_id = 5;
  double amount = 6;
  string currency = 7;
  string direction = 8;            // "credit" | "debit"
  string reason = 9;
  string confirmation_status = 10; // pending | confirmed | denied
  string settlement_status = 11;   // pending | verified | failed
  string provider_transaction_id = 12;
  string provider_status = 13;
  string notes = 14;
  string executed_at = 15;
  string confirmed_at = 16;
  string escalated_at = 17;
  int32  verification_attempts = 18;
  int32  max_verification_retries = 19;
  string created_at = 20;
  string updated_at = 21;
  string side = 22;                // derived: "buy" | "sell"
}

message AdminListRefundLedgerResponse {
  repeated AdminRefundLedgerEntry entries = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

