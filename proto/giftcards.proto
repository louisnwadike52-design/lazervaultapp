// =====================================================================
// ADMIN ANALYTICS / RECONCILIATION / SUPPORT MESSAGE TYPES
//
// Used by the admin dashboard via admin-gateway. These power
// /giftcards/analytics, /giftcards/reconciliation, and /giftcards/support.
// All currency amounts are decimal kobo unless noted otherwise.
// =====================================================================

// ----- Analytics ----------------------------------------------------

message GetGiftCardsAnalyticsRequest {
  string time_range = 1;   // "24h" | "7d" | "30d" | "90d" | "all"
  string provider   = 2;   // "" | "prestmit" | "manual" | provider_name
}

message RevenuePoint {
  string date       = 1;   // YYYY-MM-DD bucket
  double revenue    = 2;
  double payouts    = 3;
}

message ProviderSlice {
  string provider   = 1;
  int64  sales      = 2;
  double revenue    = 3;
}

message TopCardType {
  string card_type  = 1;
  int64  sales      = 2;
  double revenue    = 3;
}

message SettlementSlice {
  string status     = 1;
  int64  count      = 2;
}

message ProviderPerformance {
  string provider          = 1;
  double success_rate      = 2;
  double average_latency_ms = 3;
  int64  errors            = 4;
}

message GetGiftCardsAnalyticsResponse {
  double total_revenue            = 1;
  double total_payouts            = 2;
  double gross_profit             = 3;
  double profit_margin            = 4;
  int64  total_sales              = 5;
  double approval_rate            = 6;
  double revenue_change_percent   = 7;
  double payouts_change_percent   = 8;
  double profit_change_percent    = 9;
  double sales_change_percent     = 10;
  repeated RevenuePoint revenue_over_time      = 11;
  repeated ProviderSlice sales_by_provider     = 12;
  repeated TopCardType top_card_types          = 13;
  repeated SettlementSlice settlement_status   = 14;
  repeated ProviderPerformance provider_performance = 15;
}

// ----- Reconciliation ----------------------------------------------

message ReconciliationRun {
  string id              = 1;
  string type            = 2;   // orphan_resolution | escalation | scheduled
  string status          = 3;   // pass | partial | fail
  string timestamp       = 4;   // RFC3339
  int64  items_processed = 5;
  int64  resolved        = 6;
  int64  escalated       = 7;
  string duration        = 8;   // human readable
}

message GetReconciliationOverviewRequest {}

message GetReconciliationOverviewResponse {
  int64  orphaned_transactions  = 1;
  int64  pending_verification   = 2;
  int64  escalated_items        = 3;
  int64  resolved_today         = 4;
  double float_variance         = 5;
  bool   float_variance_critical = 6;
  ReconciliationRun last_reconciliation = 7;
}

message OrphanedTransaction {
  string id          = 1;
  string type        = 2;   // sell | buy | refund
  string reference   = 3;
  double amount      = 4;
  string issue       = 5;
  string created_at  = 6;
}

message GetOrphanedTransactionsRequest {
