syntax = "proto3";

package pb;

option go_package = "github.com/lazervault/crypto-service/proto;proto";

import "google/protobuf/timestamp.proto";

// ============================================================================
// ENUMS
// ============================================================================

enum CryptoPriceChangeTimeframe {
  CRYPTO_PRICE_CHANGE_TIMEFRAME_UNSPECIFIED = 0;
  CRYPTO_PRICE_CHANGE_TIMEFRAME_1H = 1;
  CRYPTO_PRICE_CHANGE_TIMEFRAME_24H = 2;
  CRYPTO_PRICE_CHANGE_TIMEFRAME_7D = 3;
  CRYPTO_PRICE_CHANGE_TIMEFRAME_30D = 4;
  CRYPTO_PRICE_CHANGE_TIMEFRAME_1Y = 5;
}

enum CryptoHistoryRange {
  CRYPTO_HISTORY_RANGE_UNSPECIFIED = 0;
  CRYPTO_HISTORY_RANGE_1D = 1;
  CRYPTO_HISTORY_RANGE_7D = 2;
  CRYPTO_HISTORY_RANGE_30D = 3;
  CRYPTO_HISTORY_RANGE_90D = 4;
  CRYPTO_HISTORY_RANGE_1Y = 5;
  CRYPTO_HISTORY_RANGE_ALL = 6;
}

// ============================================================================
// MESSAGE TYPES
// ============================================================================

message CryptoMessage {
  string id = 1;
  string symbol = 2;
  string name = 3;
  string image = 4;
  double current_price = 5;
  uint64 market_cap = 6;
  int32 market_cap_rank = 7;
  uint64 total_volume = 8;
  double high_24h = 9;
  double low_24h = 10;
  double price_change_24h = 11;
  double price_change_percentage_24h = 12;
  double price_change_percentage_7d = 13;
  double price_change_percentage_30d = 14;
  double price_change_percentage_1y = 15;
  double circulating_supply = 16;
  double total_supply = 17;
  double max_supply = 18;
  double ath = 19;
  double ath_change_percentage = 20;
  google.protobuf.Timestamp ath_date = 21;
  double atl = 22;
  double atl_change_percentage = 23;
  google.protobuf.Timestamp atl_date = 24;
  google.protobuf.Timestamp last_updated = 25;
  repeated PricePoint price_history = 26;
  string description = 27;
  repeated string categories = 28;
  map<string, string> links = 29;
  double fully_diluted_valuation = 30;
  double market_cap_change_24h = 31;
  double market_cap_change_percentage_24h = 32;
}

message PricePoint {
  google.protobuf.Timestamp timestamp = 1;
  double price = 2;
  double volume = 3;
  double market_cap = 4;
  double open = 5;
  double high = 6;
  double low = 7;
  double close = 8;
}

// ============================================================================
// REQUEST/RESPONSE MESSAGES
// ============================================================================

message GetCryptosRequest {
  int32 page = 1;
  int32 per_page = 2;
  string vs_currency = 3;
  string order = 4;
  repeated string ids = 5;
  string category = 6;
}

message GetCryptosResponse {
  repeated CryptoMessage cryptos = 1;
  CryptoPaginationInfo pagination = 2;
}

message GetCryptoByIdRequest {
  string id = 1;
  bool include_market_data = 2;
  bool include_community_data = 3;
  bool include_developer_data = 4;
  string vs_currency = 5;
}

message GetCryptoByIdResponse {
  CryptoMessage crypto = 1;
}

message SearchCryptosRequest {
  string query = 1;
}

message SearchCryptosResponse {
  repeated CryptoMessage cryptos = 1;
}

message GetCryptoPriceHistoryRequest {
  string id = 1;
  string range = 2;
  string vs_currency = 3;
  int32 interval = 4;
}

message GetCryptoPriceHistoryResponse {
  repeated PricePoint price_history = 1;
  string crypto_id = 2;
  string range = 3;
}

message GetTrendingCryptosRequest {
  int32 limit = 1;
}

message GetTrendingCryptosResponse {
  repeated CryptoMessage cryptos = 1;
}

message GetTopCryptosRequest {
  int32 limit = 1;
  string vs_currency = 2;
}

message GetTopCryptosResponse {
  repeated CryptoMessage cryptos = 1;
}

message GetMarketChartRequest {
  string id = 1;
  string vs_currency = 2;
  int32 days = 3;
  string interval = 4;
}

message GetMarketChartResponse {
  repeated PricePoint prices = 1;
  repeated PricePoint market_caps = 2;
  repeated PricePoint total_volumes = 3;
}

message GetGlobalMarketDataRequest {}

message GetGlobalMarketDataResponse {
  double total_market_cap = 1;
  double total_volume_24h = 2;
  double market_cap_percentage_btc = 3;
  double market_cap_percentage_eth = 4;
  int32 active_cryptocurrencies = 5;
  int32 markets = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// ============================================================================
// CRYPTO → FIAT SPOT RATE (crypto-service)
// Message names are crypto-specific so generated descriptors do not collide with
// exchange-service's pb.GetExchangeRate* (same binary may link both stubs).
// ============================================================================

message GetCryptoFiatRateRequest {
  string crypto_id = 1;
  string fiat_currency = 2;
}

message GetCryptoFiatRateResponse {
  string crypto_id = 1;
  string fiat_currency = 2;
  double rate = 3;
  double fee_percentage = 4;
  double spread = 5;
  google.protobuf.Timestamp valid_until = 6;
}

// ============================================================================
// WALLET & TRADING METHODS
// ============================================================================

message GetCryptoHoldingsRequest {
  string user_id = 1;
}

message GetCryptoHolding {
  string crypto_id = 1;
  string symbol = 2;
  string name = 3;
  double balance = 4;
  double fiat_value = 5;
  string fiat_currency = 6;
  google.protobuf.Timestamp acquired_at = 7;
}

message GetCryptoHoldingsResponse {
  repeated GetCryptoHolding holdings = 1;
  double total_fiat_value = 2;
  string fiat_currency = 3;
}

message GetCryptoTransactionsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message CryptoTransaction {
  string id = 1;
  string type = 2;
  string crypto_id = 3;
  string crypto_symbol = 4;
  double amount = 5;
  double fiat_value = 6;
  string fiat_currency = 7;
  google.protobuf.Timestamp timestamp = 8;
  string status = 9;
  double fee = 10;
  double exchange_rate = 11;
}

message GetCryptoTransactionsResponse {
  repeated CryptoTransaction transactions = 1;
  int32 total_count = 2;
}

message BuyCryptoRequest {
  string user_id = 1;
  string crypto_id = 2;
  double fiat_amount = 3;
  string fiat_currency = 4;
  string transaction_pin = 5;
  string idempotency_key = 6;
  string wallet_id = 7;  // Optional: specific wallet to use (defaults to provider's default)
}

message BuyCryptoResponse {
  string transaction_id = 1;
  string crypto_id = 2;
  double crypto_amount = 3;
  double fiat_amount = 4;
  string status = 5;
  double fee = 6;
  double exchange_rate = 7;
  double net_amount = 8;
  string wallet_id = 9;     // Wallet that was used for the trade
  double provider_rate = 10;  // Raw rate from provider (before spread)
  double quoted_rate = 11;   // Rate shown to user (after spread)
  double spread_amount = 12; // Spread retained by platform (in fiat minor units)
}

message SellCryptoRequest {
  string user_id = 1;
  string crypto_id = 2;
  double crypto_amount = 3;
  string fiat_currency = 4;
  string transaction_pin = 5;
  string idempotency_key = 6;
  string wallet_id = 7;  // Optional: specific wallet to use (defaults to provider's default)
}

message SellCryptoResponse {
  string transaction_id = 1;
  string crypto_id = 2;
  double fiat_amount = 3;
  double crypto_amount = 4;
  string status = 5;
  double fee = 6;
  double exchange_rate = 7;
  double net_amount = 8;
  string wallet_id = 9;     // Wallet that was used for the trade
  double provider_rate = 10;  // Raw rate from provider (before spread)
  double quoted_rate = 11;   // Rate shown to user (after spread)
  double spread_amount = 12; // Spread retained by platform (in fiat minor units)
}

message ConvertCryptoRequest {
  string user_id = 1;
  string from_crypto_id = 2;
  string to_crypto_id = 3;
  double from_amount = 4;
  string transaction_pin = 5;
  string idempotency_key = 6;
}

message ConvertCryptoResponse {
  string transaction_id = 1;
  double to_amount = 2;
  double rate = 3;
  string status = 4;
  double fee = 5;
  double from_amount = 6;
}

message GetWalletsRequest {
  string user_id = 1;
}

message CryptoWallet {
  string id = 1;
  string crypto_id = 2;
  string crypto_symbol = 3;
  string address = 4;
  double balance = 5;
  string wallet_type = 6;
  string chain = 7;
  string crypto_name = 8;
}

message GetWalletsResponse {
  repeated CryptoWallet wallets = 1;
}

message CreateWalletRequest {
  string user_id = 1;
  string crypto_id = 2;
  string wallet_type = 3;
  string chain = 4;
}

message CreateWalletResponse {
  string wallet_id = 1;
  string address = 2;
  string crypto_id = 3;
  string status = 4;
  string chain = 5;
  string crypto_name = 6;
}

// Batch Create Wallets (stablecoin auto-creation)
message BatchCreateWalletsRequest {
  string user_id = 1;
}

message BatchCreateWalletsResponse {
  repeated CryptoWallet wallets = 1;
  int32 created_count = 2;
  int32 failed_count = 3;
}

message GetWalletBalanceRequest {
  string wallet_id = 1;
}

message GetWalletBalanceResponse {
  string wallet_id = 1;
  string crypto_id = 2;
  double balance = 3;
  double fiat_value = 4;
}

// ============================================================================
// WATCHLIST METHODS
// ============================================================================

message CryptoWatchlistProto {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string crypto_ids = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message CreateWatchlistRequest {
  string name = 1;
  string description = 2;
}

message CreateWatchlistResponse {
  CryptoWatchlistProto watchlist = 1;
}

message GetWatchlistsRequest {}

message GetWatchlistsResponse {
  repeated CryptoWatchlistProto watchlists = 1;
}

message AddToWatchlistRequest {
  string watchlist_id = 1;
  string crypto_id = 2;
}

message AddToWatchlistResponse {
  CryptoWatchlistProto watchlist = 1;
}

message RemoveFromWatchlistRequest {
  string watchlist_id = 1;
  string crypto_id = 2;
}

message RemoveFromWatchlistResponse {
  CryptoWatchlistProto watchlist = 1;
}

message DeleteWatchlistRequest {
  string watchlist_id = 1;
}

message DeleteWatchlistResponse {
  bool success = 1;
}

// Toggle Favorite
message ToggleFavoriteRequest {
  string crypto_id = 1;
}

message ToggleFavoriteResponse {
  bool is_favorite = 1;
  string message = 2;
}

// ============================================================================
// ADMIN — PLATFORM PORTFOLIO AGGREGATION
// ============================================================================

message GetPlatformCryptoPortfolioRequest {
  string fiat_currency = 1; // e.g. "USD", "NGN"
}

message AssetAllocation {
  string crypto_id = 1;
  string symbol = 2;
  string name = 3;
  double total_balance = 4;          // Sum of all users' holdings
  double total_fiat_value = 5;       // total_balance * current_price
  double current_price = 6;
  double allocation_percentage = 7;  // % of total portfolio value
  int32 holders_count = 8;           // Unique users holding this asset
  double price_change_24h = 9;
}

message PlatformCryptoStats {
  int32 total_users_with_holdings = 1;
  int32 total_wallets = 2;
  int32 total_transactions = 3;
  int32 total_unique_assets = 4;
}

message GetPlatformCryptoPortfolioResponse {
  double total_portfolio_value = 1;
  string fiat_currency = 2;
  repeated AssetAllocation assets = 3;
  PlatformCryptoStats stats = 4;
  google.protobuf.Timestamp last_updated = 5;
}

// Admin: paginated platform-wide transaction list
message GetPlatformCryptoTransactionsRequest {
  int32 page = 1;
  int32 per_page = 2;
  string status_filter = 3;   // optional: pending, completed, failed
  string type_filter = 4;     // optional: buy, sell, swap
}

message GetPlatformCryptoTransactionsResponse {
  repeated CryptoTransaction transactions = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 per_page = 4;
}

// ============================================================================
// NEWS & OHLCV
// ============================================================================

message CryptoNewsItem {
  string id = 1;
  string title = 2;
  string url = 3;
  google.protobuf.Timestamp published_at = 4;
  repeated string currencies = 5;
  string source = 6;
  string sentiment = 7;
  int32 votes_positive = 8;
  int32 votes_negative = 9;
}

message GetCryptoNewsRequest {
  repeated string currencies = 1;
  int32 limit = 2;
}

message GetCryptoNewsResponse {
  repeated CryptoNewsItem items = 1;
}

message OHLCVPoint {
  google.protobuf.Timestamp timestamp = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  double volume = 6;
}

message GetOHLCVRequest {
  string crypto_id = 1;
  string vs_currency = 2;
  int32 days = 3;
}

message GetOHLCVResponse {
  repeated OHLCVPoint points = 1;
}

// ============================================================================
// ORDER BOOK & RECENT TRADES
// ============================================================================

message OrderBookEntry {
  string price = 1;
  string volume = 2;
}

message GetOrderBookRequest {
  string market = 1;  // e.g. "btcngn"
}

message GetOrderBookResponse {
  repeated OrderBookEntry bids = 1;
  repeated OrderBookEntry asks = 2;
  string market = 3;
}

message TradeEntry {
  string id = 1;
  string price = 2;
  string volume = 3;
  string side = 4;  // "buy" or "sell"
  string market = 5;
  google.protobuf.Timestamp created_at = 6;
}

message GetRecentTradesRequest {
  string market = 1;
}

message GetRecentTradesResponse {
  repeated TradeEntry trades = 1;
}

// ============================================================================
// FEAR & GREED INDEX
// ============================================================================

message GetFearGreedIndexRequest {}

message FearGreedEntry {
  int32 value = 1;
  string classification = 2;  // "Extreme Fear", "Fear", "Neutral", "Greed", "Extreme Greed"
  google.protobuf.Timestamp timestamp = 3;
}

message GetFearGreedIndexResponse {
  FearGreedEntry current = 1;
  repeated FearGreedEntry history = 2;
}

// ============================================================================
// PRICE ALERTS
// ============================================================================

message PriceAlert {
  string id = 1;
  string crypto_id = 2;
  string crypto_symbol = 3;
  double target_price = 4;
  string direction = 5;  // "above" or "below"
  string fiat_currency = 6;
  bool is_active = 7;
  bool is_triggered = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp triggered_at = 10;
}

message CreatePriceAlertRequest {
  string crypto_id = 1;
  double target_price = 2;
  string direction = 3;
  string fiat_currency = 4;
}

message CreatePriceAlertResponse {
  PriceAlert alert = 1;
}

message GetPriceAlertsRequest {
  bool active_only = 1;
}

message GetPriceAlertsResponse {
  repeated PriceAlert alerts = 1;
}

message DeletePriceAlertRequest {
  string alert_id = 1;
}

message DeletePriceAlertResponse {
  bool success = 1;
}

// ============================================================================
// FEE TIERS (admin)
// ============================================================================

message FeeTier {
  string id = 1;
  string currency = 2;
  string crypto_id = 3;
  double min_amount = 4;
  double max_amount = 5;
  double fee_percentage = 6;
  bool is_active = 7;
}

message GetFeeTiersRequest {}

message GetFeeTiersResponse {
  repeated FeeTier tiers = 1;
}

message CreateFeeTierRequest {
  string currency = 1;
  string crypto_id = 2;
  double min_amount = 3;
  double max_amount = 4;
  double fee_percentage = 5;
}

message CreateFeeTierResponse {
  FeeTier tier = 1;
}

message UpdateFeeTierRequest {
  string id = 1;
  double fee_percentage = 2;
  bool is_active = 3;
}

message UpdateFeeTierResponse {
  FeeTier tier = 1;
}

message DeleteFeeTierRequest {
  string id = 1;
}

message DeleteFeeTierResponse {
  bool success = 1;
}

// ============================================================================
// RECONCILIATION (admin)
// ============================================================================

message RunReconciliationRequest {
  string triggered_by = 1;
}

message ReconciliationResult {
  string id = 1;
  string date = 2;
  int32 expired_holds_released = 3;
  int32 stuck_transactions_found = 4;
  int32 failed_outbox_count = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
}

message GetReconciliationLogsRequest {
  int32 limit = 1;
}

message GetReconciliationLogsResponse {
  repeated ReconciliationResult logs = 1;
}

// ============================================================================
// ADMIN — TRANSACTION MANAGEMENT
// ============================================================================

message SagaStepDetail {
  string name = 1;
  string status = 2;          // "completed", "failed", "pending", "compensated"
  google.protobuf.Timestamp started_at = 3;
  google.protobuf.Timestamp completed_at = 4;
  string error = 5;
}

message GetTransactionDetailRequest {
  string transaction_id = 1;
}

message GetTransactionDetailResponse {
  string id = 1;
  string user_id = 2;
  string account_id = 3;
  string type = 4;             // "buy", "sell", "swap"
  string crypto_id = 5;
  string crypto_symbol = 6;
  double amount = 7;
  double fiat_value = 8;
  string fiat_currency = 9;
  double fee = 10;
  double exchange_rate = 11;
  string status = 12;
  string saga_id = 13;
  string hold_id = 14;
  string provider_order_id = 15;
  string idempotency_key = 16;
  repeated SagaStepDetail saga_steps = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
}

message RetryTransactionRequest {
  string transaction_id = 1;
  string admin_user_id = 2;
  string reason = 3;
}

message RetryTransactionResponse {
  bool success = 1;
  string message = 2;
  string new_saga_id = 3;
}

message ReverseTransactionRequest {
  string transaction_id = 1;
  string admin_user_id = 2;
  string reason = 3;
}

message ReverseTransactionResponse {
  bool success = 1;
  string message = 2;
  string reversal_reference = 3;
}

message GetUserCryptoAuditTrailRequest {
  string user_id = 1;
  int32 page = 2;
  int32 per_page = 3;
  string type_filter = 4;     // optional: "buy", "sell", "swap"
  string status_filter = 5;   // optional: "completed", "pending", "reversed"
}

message GetUserCryptoAuditTrailResponse {
  repeated CryptoTransaction transactions = 1;
  CryptoPaginationInfo pagination = 2;
}

// ============================================================================
// ADMIN — PLATFORM CONTROLS
// ============================================================================

message SetTradingSuspensionRequest {
  bool is_suspended = 1;
  string admin_user_id = 2;
  string reason = 3;
}

message SetTradingSuspensionResponse {
  bool is_suspended = 1;
  string message = 2;
}

message GetTradingSuspensionRequest {}

message GetTradingSuspensionResponse {
  bool is_suspended = 1;
  string suspended_by = 2;
  string reason = 3;
  google.protobuf.Timestamp suspended_at = 4;
}

message SetUserCryptoFreezeRequest {
  string user_id = 1;
  bool is_frozen = 2;
  string admin_user_id = 3;
  string reason = 4;
}

message SetUserCryptoFreezeResponse {
  bool is_frozen = 1;
  string message = 2;
}

message GetUserCryptoFreezeRequest {
  string user_id = 1;
}

message GetUserCryptoFreezeResponse {
  string user_id = 1;
  bool is_frozen = 2;
  string frozen_by = 3;
  string reason = 4;
  google.protobuf.Timestamp frozen_at = 5;
}

// ============================================================================
// PAGINATION INFO
// ============================================================================

message CryptoPaginationInfo {
  int32 current_page = 1;
  int32 total_pages = 2;
  int32 total_items = 3;
  int32 items_per_page = 4;
  bool has_next = 5;
  bool has_prev = 6;
}

// ============================================================================
// Supported Assets (Quidax-tradeable, CoinGecko-enriched)
// ============================================================================

message GetSupportedAssetsRequest {
  string vs_currency = 1; // Fiat currency for price display (default: "usd")
  int32 page = 2;         // Page number (default: 1)
  int32 per_page = 3;     // Items per page (default: 50)
}

message GetSupportedAssetsResponse {
  repeated CryptoMessage assets = 1;
  CryptoPaginationInfo pagination = 2;
}

// ============================================================================
// SPREAD & FEE CONFIG (Admin)
// ============================================================================

message GetSpreadConfigRequest {
  string provider = 1;       // Optional: filter by provider (default: all)
  string crypto_symbol = 2;   // Optional: filter by crypto
  string fiat_currency = 3;   // Optional: filter by fiat currency
}

message SpreadConfigEntry {
  string id = 1;
  string provider = 2;
  string crypto_symbol = 3;
  string fiat_currency = 4;
  int32 buy_spread_bps = 5;     // Basis points (100 = 1%)
  int32 sell_spread_bps = 6;
  double min_spread_amount = 7;
  double max_spread_amount = 8;
  bool is_active = 9;
  string notes = 10;
  string created_by = 11;
  string updated_by = 12;
}

message GetSpreadConfigResponse {
  repeated SpreadConfigEntry configs = 1;
}

message UpdateSpreadConfigRequest {
  string provider = 1;
  string crypto_symbol = 2;   // Empty for global default
  string fiat_currency = 3;   // Empty for all currencies
  int32 buy_spread_bps = 4;
  int32 sell_spread_bps = 5;
  double min_spread_amount = 6;
  double max_spread_amount = 7;
  bool is_active = 8;
  string notes = 9;
  string updated_by = 10;     // Admin user ID
}

message UpdateSpreadConfigResponse {
  SpreadConfigEntry config = 1;
}

message GetFeeConfigRequest {
  string provider = 1;       // Optional: filter by provider
  string crypto_symbol = 2;   // Optional: filter by crypto
  string fiat_currency = 3;   // Optional: filter by fiat currency
}

message FeeConfigEntry {
  string id = 1;
  string provider = 2;
  string crypto_symbol = 3;
  string fiat_currency = 4;
  double flat_fee = 5;        // Fixed fee in fiat major units
  int32 percentage_bps = 6;   // Variable fee in basis points
  double min_fee = 7;
  double max_fee = 8;
  bool is_active = 9;
  string notes = 10;
  string created_by = 11;
  string updated_by = 12;
}

message GetFeeConfigResponse {
  repeated FeeConfigEntry configs = 1;
}

message UpdateFeeConfigRequest {
  string provider = 1;
  string crypto_symbol = 2;   // Empty for global default
  string fiat_currency = 3;   // Empty for all currencies
  double flat_fee = 4;
  int32 percentage_bps = 5;
  double min_fee = 6;
  double max_fee = 7;
  bool is_active = 8;
  string notes = 9;
  string updated_by = 10;     // Admin user ID
}

message UpdateFeeConfigResponse {
  FeeConfigEntry config = 1;
}

// ============================================================================
// WALLET RECONCILIATION (Admin)
// ============================================================================

message GetWalletReconciliationsRequest {
  string user_id = 1;         // Optional: filter by user
  string wallet_id = 2;       // Optional: filter by wallet
  bool requires_attention = 3; // Only return wallets needing attention
  int32 limit = 4;
  int32 offset = 5;
}

message WalletReconciliationEntry {
  string id = 1;
  string user_id = 2;
  string wallet_id = 3;
  string crypto_symbol = 4;
  double local_balance = 5;
  double provider_balance = 6;
  double drift_amount = 7;
  double drift_percentage = 8;
  string drift_direction = 9;  // 'over_local' | 'under_local' | 'none'
  bool auto_corrected = 10;
  bool requires_attention = 11;
  string triggered_by = 12;
  string note = 13;
  google.protobuf.Timestamp created_at = 14;
}

message GetWalletReconciliationsResponse {
  repeated WalletReconciliationEntry reconciliations = 1;
  int32 total_count = 2;
}

message TriggerWalletReconciliationRequest {
  string wallet_id = 1;       // Optional: reconcile specific wallet
  string user_id = 2;         // Optional: reconcile all user wallets
  bool all_users = 3;          // Reconcile all wallets (admin only)
  string triggered_by = 4;
}

message TriggerWalletReconciliationResponse {
  int32 wallets_checked = 1;
  int32 drifts_found = 2;
  int32 auto_corrected = 3;
  int32 flagged = 4;
  string status = 5;
  string message = 6;
}

// ============================================================================
// SETTLEMENTS (Admin)
// ============================================================================

message GetSettlementsRequest {
  string fiat_currency = 1;   // Optional: filter by currency
  string status = 2;          // recorded | reconciled | paid_out
  int32 page = 3;
  int32 per_page = 4;
}

message SettlementEntry {
  string id = 1;
  string transaction_id = 2;
  string user_id = 3;
  string side = 4;            // buy | sell
  string crypto_symbol = 5;
  string fiat_currency = 6;
  double user_fiat_amount = 7;
  double provider_fiat_amount = 8;
  double spread_amount = 9;
  int32 spread_bps = 10;
  double transaction_fee = 11;
  double provider_rate = 12;
  double quoted_rate = 13;
  double crypto_amount = 14;
  string provider_order_id = 15;
  string status = 16;
  google.protobuf.Timestamp created_at = 17;
}

message GetSettlementsResponse {
  repeated SettlementEntry settlements = 1;
  int32 total_count = 2;
  double total_spread = 3;     // Sum of all spread amounts
}

message MarkSettlementsPaidRequest {
  repeated string settlement_ids = 1;
  string paid_by = 2;          // Admin user ID
}

message MarkSettlementsPaidResponse {
  int32 marked_count = 1;
  string message = 2;
}

// ============================================================================
// SERVICE DEFINITION
// ============================================================================

service CryptoService {
  rpc GetCryptos(GetCryptosRequest) returns (GetCryptosResponse);
  rpc GetCryptoById(GetCryptoByIdRequest) returns (GetCryptoByIdResponse);
  rpc SearchCryptos(SearchCryptosRequest) returns (SearchCryptosResponse);
  rpc GetCryptoPriceHistory(GetCryptoPriceHistoryRequest) returns (GetCryptoPriceHistoryResponse);
  rpc GetTrendingCryptos(GetTrendingCryptosRequest) returns (GetTrendingCryptosResponse);
  rpc GetTopCryptos(GetTopCryptosRequest) returns (GetTopCryptosResponse);
  rpc GetMarketChart(GetMarketChartRequest) returns (GetMarketChartResponse);
  rpc GetGlobalMarketData(GetGlobalMarketDataRequest) returns (GetGlobalMarketDataResponse);
  rpc GetSupportedAssets(GetSupportedAssetsRequest) returns (GetSupportedAssetsResponse);
  rpc GetCryptoFiatRate(GetCryptoFiatRateRequest) returns (GetCryptoFiatRateResponse);
  rpc GetCryptoHoldings(GetCryptoHoldingsRequest) returns (GetCryptoHoldingsResponse);
  rpc GetCryptoTransactions(GetCryptoTransactionsRequest) returns (GetCryptoTransactionsResponse);
  rpc BuyCrypto(BuyCryptoRequest) returns (BuyCryptoResponse);
  rpc SellCrypto(SellCryptoRequest) returns (SellCryptoResponse);
  rpc ConvertCrypto(ConvertCryptoRequest) returns (ConvertCryptoResponse);
  rpc GetWallets(GetWalletsRequest) returns (GetWalletsResponse);
  rpc CreateWallet(CreateWalletRequest) returns (CreateWalletResponse);
  rpc GetWalletBalance(GetWalletBalanceRequest) returns (GetWalletBalanceResponse);
  rpc BatchCreateWallets(BatchCreateWalletsRequest) returns (BatchCreateWalletsResponse);
  rpc CreateWatchlist(CreateWatchlistRequest) returns (CreateWatchlistResponse);
  rpc GetWatchlists(GetWatchlistsRequest) returns (GetWatchlistsResponse);
  rpc AddToWatchlist(AddToWatchlistRequest) returns (AddToWatchlistResponse);
  rpc RemoveFromWatchlist(RemoveFromWatchlistRequest) returns (RemoveFromWatchlistResponse);
  rpc DeleteWatchlist(DeleteWatchlistRequest) returns (DeleteWatchlistResponse);
  rpc ToggleFavorite(ToggleFavoriteRequest) returns (ToggleFavoriteResponse);

  // Market Data: News, OHLCV, Order Book, Trades
  rpc GetCryptoNews(GetCryptoNewsRequest) returns (GetCryptoNewsResponse);
  rpc GetOHLCV(GetOHLCVRequest) returns (GetOHLCVResponse);
  rpc GetOrderBook(GetOrderBookRequest) returns (GetOrderBookResponse);
  rpc GetRecentTrades(GetRecentTradesRequest) returns (GetRecentTradesResponse);
  rpc GetFearGreedIndex(GetFearGreedIndexRequest) returns (GetFearGreedIndexResponse);

  // Price Alerts
  rpc CreatePriceAlert(CreatePriceAlertRequest) returns (CreatePriceAlertResponse);
  rpc GetPriceAlerts(GetPriceAlertsRequest) returns (GetPriceAlertsResponse);
  rpc DeletePriceAlert(DeletePriceAlertRequest) returns (DeletePriceAlertResponse);

  // Admin RPCs (require admin role in metadata)
  rpc GetPlatformCryptoPortfolio(GetPlatformCryptoPortfolioRequest) returns (GetPlatformCryptoPortfolioResponse);
  rpc GetPlatformCryptoTransactions(GetPlatformCryptoTransactionsRequest) returns (GetPlatformCryptoTransactionsResponse);
  rpc GetFeeTiers(GetFeeTiersRequest) returns (GetFeeTiersResponse);
  rpc CreateFeeTier(CreateFeeTierRequest) returns (CreateFeeTierResponse);
  rpc UpdateFeeTier(UpdateFeeTierRequest) returns (UpdateFeeTierResponse);
  rpc DeleteFeeTier(DeleteFeeTierRequest) returns (DeleteFeeTierResponse);
  rpc RunReconciliation(RunReconciliationRequest) returns (ReconciliationResult);
  rpc GetReconciliationLogs(GetReconciliationLogsRequest) returns (GetReconciliationLogsResponse);

  // Admin — spread & fee config
  rpc GetSpreadConfig(GetSpreadConfigRequest) returns (GetSpreadConfigResponse);
  rpc UpdateSpreadConfig(UpdateSpreadConfigRequest) returns (UpdateSpreadConfigResponse);
  rpc GetFeeConfig(GetFeeConfigRequest) returns (GetFeeConfigResponse);
  rpc UpdateFeeConfig(UpdateFeeConfigRequest) returns (UpdateFeeConfigResponse);

  // Admin — wallet reconciliation
  rpc GetWalletReconciliations(GetWalletReconciliationsRequest) returns (GetWalletReconciliationsResponse);
  rpc TriggerWalletReconciliation(TriggerWalletReconciliationRequest) returns (TriggerWalletReconciliationResponse);

  // Admin — settlements
  rpc GetSettlements(GetSettlementsRequest) returns (GetSettlementsResponse);
  rpc MarkSettlementsPaid(MarkSettlementsPaidRequest) returns (MarkSettlementsPaidResponse);

  // Admin — transaction management
  rpc GetTransactionDetail(GetTransactionDetailRequest) returns (GetTransactionDetailResponse);
  rpc RetryTransaction(RetryTransactionRequest) returns (RetryTransactionResponse);
  rpc ReverseTransaction(ReverseTransactionRequest) returns (ReverseTransactionResponse);
  rpc GetUserCryptoAuditTrail(GetUserCryptoAuditTrailRequest) returns (GetUserCryptoAuditTrailResponse);

  // Admin — platform controls
  rpc SetTradingSuspension(SetTradingSuspensionRequest) returns (SetTradingSuspensionResponse);
  rpc GetTradingSuspension(GetTradingSuspensionRequest) returns (GetTradingSuspensionResponse);
  rpc SetUserCryptoFreeze(SetUserCryptoFreezeRequest) returns (SetUserCryptoFreezeResponse);
  rpc GetUserCryptoFreeze(GetUserCryptoFreezeRequest) returns (GetUserCryptoFreezeResponse);
}
