// === PiggyVault Config (Backend-Configurable ROI) ===
message PiggyVaultConfigProto {
  string id = 1;
  string lock_type = 2;
  string currency = 3;
  string display_name = 4;
  double base_interest_rate = 5;
  double max_interest_rate = 6;
  double early_withdrawal_penalty = 7;
  int32 min_duration_days = 8;
  int32 max_duration_days = 9;
  double min_amount = 10;
  double max_amount = 11;
  bool allows_early_withdrawal = 12;
  bool supports_auto_renew = 13;
  bool supports_top_up = 14;
  bool supports_auto_save = 15;
  bool supports_upfront_interest = 16;
  string duration_bonus_tiers = 17;     // JSON array
  bool is_active = 18;
  string description = 19;
  // is_fixed_amount=true forces the wizard to deposit exactly
  // fixed_amount; the amount input is hidden and the user just
  // confirms the headline figure.
  bool is_fixed_amount = 20;
  double fixed_amount = 21;
  // JSON array of integers (days) — wizard renders these as
  // quick-pick duration chips. Empty array → client falls back
  // to a generic preset filtered by min/max.
  string duration_options = 22;
  // JSON array of decimals — wizard renders these as quick-pick
  // amount pills. Empty array → no pills, free-form amount only.
  string quick_amount_options = 23;
  // Newline-separated bullets rendered on the Pay & confirm slide's
  // "Before you confirm" panel. confirmation_notes shows always;
  // confirmation_notes_renew_on/off are appended below it based on
  // the user's auto-renew toggle. Empty strings → no extra notes.
  string confirmation_notes = 24;
  string confirmation_notes_renew_on = 25;
  string confirmation_notes_renew_off = 26;
}

message GetPiggyVaultConfigRequest {
  string lock_type = 1;
  string currency = 2;                  // Optional, defaults to account currency
}

