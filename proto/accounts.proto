  string from_date = 4;
  string to_date = 5;
  int32 page = 6;
  int32 per_page = 7;
}

message AdminAccountTransactionsResponse {
  repeated AdminTransaction transactions = 1;
  int64 total = 2;
}

message AdminTransaction {
  string id = 1;
  string reference = 2;
  string type = 3;
  string category = 4;
  int64 amount = 5;
  int64 balance_before = 6;
  int64 balance_after = 7;
