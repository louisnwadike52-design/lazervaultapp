}

message AdminPlatformWallet {
  string id = 1;
  string code = 2;
  string name = 3;
  int64 balance = 4;
  string currency = 5;
  string description = 6;
}

message AdminGetPlatformWalletTransactionsRequest {
  string wallet_code = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message AdminGetPlatformWalletTransactionsResponse {
  repeated AdminTransaction transactions = 1;
  int64 total = 2;
}

message AdminGetClearingRecordsRequest {
