message AdminGetAccountClearingRequest {
  string account_id = 1;
  string status = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message AdminAccountClearingResponse {
  repeated AdminClearingRecord records = 1;
  int64 total = 2;
}

message AdminListAllHoldsRequest {
  string status = 1;
  string account_id = 2;
  int32 age_hours = 3;                  // filter by age (e.g., 24 = older than 24h)
  int32 page = 4;
  int32 per_page = 5;
}

message AdminListAllHoldsResponse {
  repeated AdminHold holds = 1;
  int64 total = 2;
}

message AdminGetStaleHoldsRequest {
  int32 page = 1;
  int32 per_page = 2;
}

message AdminGetStaleHoldsResponse {
  repeated AdminHold holds = 1;
  int64 total = 2;
}

message AdminGetAllPlatformWalletsRequest {}

message AdminGetAllPlatformWalletsResponse {
