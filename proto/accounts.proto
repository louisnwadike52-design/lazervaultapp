  string status = 9;
  string service_name = 10;
  string created_at = 11;
  string metadata = 12;
}

message AdminGetAccountHoldsRequest {
  string account_id = 1;
  string status = 2;                    // "active", "captured", "released", or empty for all
  int32 page = 3;
  int32 per_page = 4;
}

message AdminAccountHoldsResponse {
  repeated AdminHold holds = 1;
  int64 total = 2;
}

message AdminHold {
  string id = 1;
  string account_id = 2;
  int64 amount = 3;
  string currency = 4;
  string reference = 5;
  string reason = 6;
  string status = 7;
  string service_name = 8;
  string created_at = 9;
  string expires_at = 10;
  string captured_at = 11;
  string released_at = 12;
  string idempotency_key = 13;
