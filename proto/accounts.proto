  bool success = 2;
}

// ===== Get Balance =====
// NOTE: user_id extracted from JWT token, not from request
message GetBalanceRequest {
  string account_id = 1;
}

message GetBalanceResponse {
  double balance = 1;
  double available_balance = 2;
  string currency = 3;
  string last_updated = 4;
}

// ===== Update Balance (Internal) =====
message UpdateBalanceRequest {
  string account_id = 1;
  double amount = 2;
  string operation = 3;                 // "add", "subtract"
  string reference = 4;
  string description = 5;
  string category = 6;
  // When true (and operation == "subtract"), this debit is a
  // system-initiated reactive operation — e.g. provider clawback,
  // refund pipeline — and is allowed to drive available_balance
  // below zero down to the per-account overdraft floor (bounded by
  // global system_settings cap). User-initiated debits (transfer,
  // bill, buy) MUST leave reactive=false. Ignored for "add".
  bool reactive = 7;
}

message UpdateBalanceResponse {
  double new_balance = 1;
  double available_balance = 2;
  Transaction transaction = 3;
}

// ===== Get Transactions =====
// NOTE: user_id extracted from JWT token, not from request
message GetTransactionsRequest {
  string account_id = 1;
  string type = 2;                      // Optional filter: "credit", "debit"
  string category = 3;                  // Optional filter
  string status = 4;                    // Optional filter
  string start_date = 5;
  string end_date = 6;
  int32 limit = 7;
  int32 offset = 8;
}

message GetTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 total = 2;
  double total_credits = 3;
  double total_debits = 4;
}

// ===== Freeze Account =====
// NOTE: user_id extracted from JWT token, not from request
message FreezeAccountRequest {
  string account_id = 1;
  string reason = 2;
  int32 reason_code = 3;
  string frozen_by = 4;
}

message FreezeAccountResponse {
  Account account = 1;
