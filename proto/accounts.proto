  string account_id = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message AdminGetClearingRecordsResponse {
  repeated AdminClearingRecord records = 1;
  int64 total = 2;
}

message AdminClearingRecord {
  string id = 1;
  string account_id = 2;
  string user_id = 3;
  int64 amount = 4;
  string currency = 5;
  string status = 6;
  string clearing_tier = 7;
  string source_reference = 8;
  string provider = 9;
  string provider_tx_id = 10;
  string created_at = 11;
  string clears_at = 12;
  string cleared_at = 13;
