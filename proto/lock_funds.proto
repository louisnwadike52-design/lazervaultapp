syntax = "proto3";

package pb;

option go_package = "lazervaultGo/pb";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

// Lock type enumeration
enum LockType {
  LOCK_TYPE_UNSPECIFIED = 0;
  LOCK_TYPE_SAVINGS = 1;
  LOCK_TYPE_INVESTMENT = 2;
  LOCK_TYPE_EMERGENCY_FUND = 3;
  LOCK_TYPE_GOAL_BASED = 4;
}

// Lock status enumeration
enum LockStatus {
  LOCK_STATUS_UNSPECIFIED = 0;
  LOCK_STATUS_ACTIVE = 1;
  LOCK_STATUS_MATURED = 2;
  LOCK_STATUS_UNLOCKED = 3;
  LOCK_STATUS_CANCELLED = 4;
}

// Lock fund message
message LockFund {
  string id = 1;
  uint64 user_id = 2;
  LockType lock_type = 3;
  double amount = 4;
  string currency = 5;
  int32 lock_duration_days = 6;
  double interest_rate = 7;
  google.protobuf.Timestamp locked_at = 8;
  google.protobuf.Timestamp unlock_at = 9;
  LockStatus status = 10;
  bool auto_renew = 11;
  string goal_name = 12;
  string goal_description = 13;
  double early_unlock_penalty_percent = 14;
  double accrued_interest = 15;
  string payment_method = 16;
  string transaction_id = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;

  // Computed fields
  int32 days_remaining = 20;
  double progress_percent = 21;
  double total_value = 22;
  bool can_unlock_early = 23;

  // Account tracking
  string source_account_id = 24;
  string destination_account_id = 25;
}

// Lock transaction message
message LockTransaction {
  string id = 1;
  string lock_fund_id = 2;
  uint64 user_id = 3;
  string transaction_type = 4;
  double amount = 5;
  string currency = 6;
  string payment_method = 7;
  string status = 8;
  google.protobuf.Timestamp transaction_date = 9;
  string description = 10;
}

// === PiggyVault Config (backend-configurable rates) ===
message PiggyVaultConfig {
  string id = 1;
  string lock_type = 2;
  string currency = 3;
  string display_name = 4;
  double base_interest_rate = 5;
  double max_interest_rate = 6;
  double early_withdrawal_penalty = 7;
  int32 min_duration_days = 8;
  int32 max_duration_days = 9;
  double min_amount = 10;
  double max_amount = 11;
  bool allows_early_withdrawal = 12;
  bool supports_auto_renew = 13;
  bool supports_top_up = 14;
  bool supports_auto_save = 15;
  bool supports_upfront_interest = 16;
  string duration_bonus_tiers = 17;
  bool is_active = 18;
  string description = 19;
  bool is_fixed_amount = 20;
  double fixed_amount = 21;
  string duration_options = 22;
  string quick_amount_options = 23;
}

// === Lock Fund AutoSave ===
message LockFundAutoSave {
  string id = 1;
  string lock_fund_id = 2;
  string source_account_id = 3;
  double amount = 4;
  string frequency = 5;
  string status = 6;
  string next_run_at = 7;
  string last_run_at = 8;
  double total_saved = 9;
  int32 run_count = 10;
}

// === CRUD Messages ===

// Create lock fund
message CreateLockFundRequest {
  LockType lock_type = 1;
  double amount = 2;
  string currency = 3;
  int32 lock_duration_days = 4;
  bool auto_renew = 5;
  string goal_name = 6;
  string goal_description = 7;
  string payment_method = 8;
  string source_account_id = 9;
  string transaction_pin = 10;
  string interest_destination_account_id = 11;
}

message CreateLockFundResponse {
  bool success = 1;
  string message = 2;
  LockFund lock_fund = 3;
  string payment_url = 4;
}

// Get lock funds list
message GetLockFundsRequest {
  LockStatus status = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message GetLockFundsResponse {
  repeated LockFund lock_funds = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 total_pages = 4;
  double total_locked_amount = 5;
  double total_accrued_interest = 6;
  int32 active_locks_count = 7;
}

// Get single lock fund
message GetLockFundRequest {
  string lock_fund_id = 1;
}

message GetLockFundResponse {
  bool success = 1;
  LockFund lock_fund = 2;
}

// Unlock fund
message UnlockFundRequest {
  string lock_fund_id = 1;
  bool force_early_unlock = 2;
  string transaction_pin = 3;
  string destination_account_id = 4;
}

message UnlockFundResponse {
  bool success = 1;
  string message = 2;
  double amount_returned = 3;
  double penalty_amount = 4;
  double interest_earned = 5;
  LockFund updated_lock_fund = 6;
  string credited_account_id = 7;
}

// Top up lock fund
message TopUpLockFundRequest {
  string lock_fund_id = 1;
  double amount = 2;
  string transaction_pin = 3;
  string source_account_id = 4;
}

message TopUpLockFundResponse {
  bool success = 1;
  string message = 2;
  LockFund updated_lock_fund = 3;
  double new_balance = 4;
}

// Get lock transactions
message GetLockTransactionsRequest {
  string lock_fund_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message GetLockTransactionsResponse {
  repeated LockTransaction transactions = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 total_pages = 4;
}

// Calculate interest
message CalculateInterestRequest {
  LockType lock_type = 1;
  double amount = 2;
  int32 lock_duration_days = 3;
}

message CalculateInterestResponse {
  double interest_rate = 1;
  double estimated_interest = 2;
  double total_return = 3;
  double apy = 4;
}

// Renew lock fund
message RenewLockFundRequest {
  string lock_fund_id = 1;
  int32 new_duration_days = 2;
}

message RenewLockFundResponse {
  bool success = 1;
  string message = 2;
  LockFund renewed_lock_fund = 3;
}

// Cancel lock fund
message CancelLockFundRequest {
  string lock_fund_id = 1;
  string reason = 2;
}

message CancelLockFundResponse {
  bool success = 1;
  string message = 2;
  double refund_amount = 3;
}

// PiggyVault configs
message GetPiggyVaultConfigsRequest {
  string currency = 1;
}

message GetPiggyVaultConfigsResponse {
  repeated PiggyVaultConfig configs = 1;
}

// Lock fund auto-save
message CreateLockFundAutoSaveRequest {
  string lock_fund_id = 1;
  string source_account_id = 2;
  double amount = 3;
  string frequency = 4;
}

message CreateLockFundAutoSaveResponse {
  bool success = 1;
  string message = 2;
  LockFundAutoSave autosave = 3;
}

message GetLockFundAutoSaveRequest {
  string lock_fund_id = 1;
}

message GetLockFundAutoSaveResponse {
  LockFundAutoSave autosave = 1;
}

message UpdateLockFundAutoSaveRequest {
  string autosave_id = 1;
  double amount = 2;
  string frequency = 3;
  string status = 4;
}

message UpdateLockFundAutoSaveResponse {
  bool success = 1;
  string message = 2;
  LockFundAutoSave autosave = 3;
}

message DeleteLockFundAutoSaveRequest {
  string autosave_id = 1;
}

message DeleteLockFundAutoSaveResponse {
  bool success = 1;
  string message = 2;
}

// Lock funds service (PiggyVault)
service LockFundsService {
  // Create a new PiggyVault lock
  rpc CreateLockFund(CreateLockFundRequest) returns (CreateLockFundResponse) {
    option (google.api.http) = {
      post: "/v1/lock-funds"
      body: "*"
    };
  }

  // Get all PiggyVault locks for the user
  rpc GetLockFunds(GetLockFundsRequest) returns (GetLockFundsResponse) {
    option (google.api.http) = {
      get: "/v1/lock-funds"
    };
  }

  // Get PiggyVault lock by ID
  rpc GetLockFund(GetLockFundRequest) returns (GetLockFundResponse) {
    option (google.api.http) = {
      get: "/v1/lock-funds/{lock_fund_id}"
    };
  }

  // Unlock/withdraw funds
  rpc UnlockFund(UnlockFundRequest) returns (UnlockFundResponse) {
    option (google.api.http) = {
      post: "/v1/lock-funds/{lock_fund_id}/unlock"
      body: "*"
    };
  }

  // Top up an existing PiggyVault lock
  rpc TopUpLockFund(TopUpLockFundRequest) returns (TopUpLockFundResponse) {
    option (google.api.http) = {
      post: "/v1/lock-funds/{lock_fund_id}/topup"
      body: "*"
    };
  }

  // Get lock transactions
  rpc GetLockTransactions(GetLockTransactionsRequest) returns (GetLockTransactionsResponse) {
    option (google.api.http) = {
      get: "/v1/lock-funds/transactions"
    };
  }

  // Calculate potential interest
  rpc CalculateInterest(CalculateInterestRequest) returns (CalculateInterestResponse) {
    option (google.api.http) = {
      post: "/v1/lock-funds/calculate-interest"
      body: "*"
    };
  }

  // Renew a matured lock
  rpc RenewLockFund(RenewLockFundRequest) returns (RenewLockFundResponse) {
    option (google.api.http) = {
      post: "/v1/lock-funds/{lock_fund_id}/renew"
      body: "*"
    };
  }

  // Cancel a lock
  rpc CancelLockFund(CancelLockFundRequest) returns (CancelLockFundResponse) {
    option (google.api.http) = {
      post: "/v1/lock-funds/{lock_fund_id}/cancel"
      body: "*"
    };
  }

  // Get all PiggyVault product configs (backend-configurable rates)
  rpc GetPiggyVaultConfigs(GetPiggyVaultConfigsRequest) returns (GetPiggyVaultConfigsResponse) {
    option (google.api.http) = {
      get: "/v1/piggyvault/configs"
    };
  }

  // Auto-save management
  rpc CreateLockFundAutoSave(CreateLockFundAutoSaveRequest) returns (CreateLockFundAutoSaveResponse) {
    option (google.api.http) = {
      post: "/v1/lock-funds/{lock_fund_id}/autosave"
      body: "*"
    };
  }

  rpc GetLockFundAutoSave(GetLockFundAutoSaveRequest) returns (GetLockFundAutoSaveResponse) {
    option (google.api.http) = {
      get: "/v1/lock-funds/{lock_fund_id}/autosave"
    };
  }

  rpc UpdateLockFundAutoSave(UpdateLockFundAutoSaveRequest) returns (UpdateLockFundAutoSaveResponse) {
    option (google.api.http) = {
      put: "/v1/lock-funds/autosave/{autosave_id}"
      body: "*"
    };
  }

  rpc DeleteLockFundAutoSave(DeleteLockFundAutoSaveRequest) returns (DeleteLockFundAutoSaveResponse) {
    option (google.api.http) = {
      delete: "/v1/lock-funds/autosave/{autosave_id}"
    };
  }
}
