  string description = 2;
  string metadata = 3;  // JSON string for external links (whatsapp, telegram) etc
  GroupVisibility visibility = 4;
  string image_url = 5;
}

message CreateGroupResponse {
  GroupAccountMessage group = 1;
}

message GetGroupRequest {
  string group_id = 1;
}

message GetGroupResponse {
  GroupAccountMessage group = 1;
}

message ListUserGroupsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string status = 3;
}

message ListUserGroupsResponse {
  repeated GroupAccountMessage groups = 1;
  GroupPaginationInfo pagination = 2;
}

message UpdateGroupRequest {
  string group_id = 1;
  string name = 2;
  string description = 3;
  GroupAccountStatus status = 4;
  string metadata = 5;
  GroupVisibility visibility = 6;
  string image_url = 7;
}

message UpdateGroupResponse {
  GroupAccountMessage group = 1;
}

message DeleteGroupRequest {
  string group_id = 1;
}

message DeleteGroupResponse {
