syntax = "proto3";

package group_accounts;

option go_package = "group-accounts-service/proto";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

// ============================================================================
// ENUMS
// ============================================================================

enum GroupAccountStatus {
  GROUP_ACCOUNT_STATUS_UNSPECIFIED = 0;
  GROUP_ACCOUNT_STATUS_ACTIVE = 1;
  GROUP_ACCOUNT_STATUS_SUSPENDED = 2;
  GROUP_ACCOUNT_STATUS_CLOSED = 3;
}

// Role enum + canonical permission boundaries (enforced server-side):
//
//   ADMIN     — full control: edit group, delete group, manage payouts,
//               update settings, and ALL moderator capabilities below.
//   MODERATOR — day-to-day group management: invite/remove non-admin
//               members, accept/reject join requests, edit non-financial
//               group metadata. CANNOT delete the group, CANNOT change
//               another member's role, CANNOT initiate payouts.
//   MEMBER    — participate: contribute, view group + payment history.
//   VIEWER    — read-only. Cannot contribute or modify anything.
enum GroupMemberRole {
  GROUP_MEMBER_ROLE_UNSPECIFIED = 0;
  GROUP_MEMBER_ROLE_ADMIN = 1;
  GROUP_MEMBER_ROLE_MEMBER = 2;
  GROUP_MEMBER_ROLE_VIEWER = 3;
  GROUP_MEMBER_ROLE_MODERATOR = 4;
}

enum GroupMemberStatus {
  GROUP_MEMBER_STATUS_UNSPECIFIED = 0;
  GROUP_MEMBER_STATUS_ACTIVE = 1;
  GROUP_MEMBER_STATUS_INACTIVE = 2;
  GROUP_MEMBER_STATUS_SUSPENDED = 3;
  GROUP_MEMBER_STATUS_REMOVED = 4;
  // Synthesized for shadow rows that represent a pending group
  // invitation. The user is not yet a real group_members row — the
  // server materializes a transient GroupMember from the live
  // GroupInvitation so the canonical member-list response carries
  // the "Invite Sent" state. Clients render an Invite Sent badge
  // and gate role/remove actions off until the invite is accepted.
  GROUP_MEMBER_STATUS_PENDING = 5;
}

enum ContributionType {
  CONTRIBUTION_TYPE_UNSPECIFIED = 0;
  CONTRIBUTION_TYPE_ONE_TIME = 1;
  reserved 2;
  reserved "CONTRIBUTION_TYPE_RECURRING";
  CONTRIBUTION_TYPE_ROTATING_SAVINGS = 3;
}

enum ContributionFrequency {
  CONTRIBUTION_FREQUENCY_UNSPECIFIED = 0;
  CONTRIBUTION_FREQUENCY_DAILY = 1;
  CONTRIBUTION_FREQUENCY_WEEKLY = 2;
  CONTRIBUTION_FREQUENCY_BIWEEKLY = 3;
  CONTRIBUTION_FREQUENCY_MONTHLY = 4;
  CONTRIBUTION_FREQUENCY_QUARTERLY = 5;
  CONTRIBUTION_FREQUENCY_YEARLY = 6;
}

enum ContributionStatus {
  CONTRIBUTION_STATUS_UNSPECIFIED = 0;
  CONTRIBUTION_STATUS_ACTIVE = 1;
  CONTRIBUTION_STATUS_PAUSED = 2;
  CONTRIBUTION_STATUS_COMPLETED = 3;
  CONTRIBUTION_STATUS_CANCELLED = 4;
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_PENDING = 1;
  PAYMENT_STATUS_PROCESSING = 2;
  PAYMENT_STATUS_COMPLETED = 3;
  PAYMENT_STATUS_FAILED = 4;
  PAYMENT_STATUS_REFUNDED = 5;
  // Phase 2 (debit) returned an ambiguous error. The supervisor is
  // verifying with accounts-service via LookupTransactionByReference.
  // The user's money MAY have moved — UI should show "we're verifying"
  // and refuse to start a fresh payment for this intent.
  PAYMENT_STATUS_AWAITING_VERIFICATION = 6;
  // Phase 3 failed AFTER a successful debit. The rollback processor is
  // issuing the compensating credit. Money WILL be returned.
  PAYMENT_STATUS_REFUNDING = 7;
  // Reconciliation exhausted automated retries. An operator must
  // intervene. Critical: the user is potentially out of pocket OR the
  // platform is potentially out of pocket — either way, do not assume.
  PAYMENT_STATUS_MANUAL_REVIEW = 8;
}

enum PayoutStatus {
  PAYOUT_STATUS_UNSPECIFIED = 0;
  PAYOUT_STATUS_PENDING = 1;
  PAYOUT_STATUS_COMPLETED = 2;
  PAYOUT_STATUS_CANCELLED = 3;
  PAYOUT_STATUS_PROCESSING = 4;
  PAYOUT_STATUS_FAILED = 5;
  PAYOUT_STATUS_MANUAL_REVIEW = 6;
}

enum PayoutTransactionStatus {
  PAYOUT_TRANSACTION_STATUS_UNSPECIFIED = 0;
  PAYOUT_TRANSACTION_STATUS_PENDING = 1;
  PAYOUT_TRANSACTION_STATUS_PROCESSING = 2;
  PAYOUT_TRANSACTION_STATUS_COMPLETED = 3;
  PAYOUT_TRANSACTION_STATUS_FAILED = 4;
  PAYOUT_TRANSACTION_STATUS_REFUNDED = 5;
}

enum GroupVisibility {
  GROUP_VISIBILITY_UNSPECIFIED = 0;
  GROUP_VISIBILITY_PRIVATE = 1;
  GROUP_VISIBILITY_PUBLIC = 2;
}

// ============================================================================
// GROUP ACCOUNT MESSAGES
// ============================================================================

message GroupAccountMessage {
  string id = 1;
  string name = 2;
  string description = 3;
  string admin_id = 4;
  GroupAccountStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  string metadata = 8;
  repeated GroupMemberMessage members = 9;
  repeated ContributionMessage contributions = 10;
  GroupVisibility visibility = 11;
  int32 member_count = 12;
  uint64 total_raised = 13;
  string image_url = 14;
  // Denormalized count of (non-soft-deleted) contributions on this
  // group. Surfaced so list-groups callers (mobile "Goals" stat
  // tile) don't need the heavy `contributions` array preloaded.
  int32 contribution_count = 15;
}

message GroupMemberMessage {
  string id = 1;
  string group_id = 2;
  string user_id = 3;
  string user_name = 4;
  string email = 5;
  string profile_image = 6;
  GroupMemberRole role = 7;
  GroupMemberStatus status = 8;
  google.protobuf.Timestamp joined_at = 9;
  string permissions = 10;
  string phone_number = 11;
  bool is_partial = 12;
  string user_username = 13;
  // Propagated from auth SearchUsers: do not infer from masked email/phone strings.
  bool email_matches_search_query = 14;
  bool phone_matches_search_query_exact = 15;
}

message ContributionMessage {
  string id = 1;
  string group_id = 2;
  string title = 3;
  string description = 4;
  uint64 target_amount = 5;
  uint64 current_amount = 6;
  string currency = 7;
  google.protobuf.Timestamp deadline = 8;
  ContributionStatus status = 9;
  string created_by = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  string metadata = 13;

  ContributionType type = 14;
  ContributionFrequency frequency = 15;
  uint64 regular_amount = 16;
  google.protobuf.Timestamp next_payment_date = 17;
  google.protobuf.Timestamp start_date = 18;
  int32 total_cycles = 19;
  int32 current_cycle = 20;

  string current_payout_recipient = 21;
  google.protobuf.Timestamp next_payout_date = 22;

  bool auto_pay_enabled = 23;
  uint64 penalty_amount = 24;
  int32 grace_period_days = 25;
  bool allow_partial_payments = 26;
  uint64 minimum_balance = 27;

  repeated ContributionPaymentMessage payments = 28;
  repeated PayoutScheduleMessage payout_schedule = 29;
  repeated PayoutTransactionMessage payout_history = 30;
  repeated ContributionMemberMessage members = 31;

  // Whether the platform fires the payout itself (auto) or the
  // creator must trigger it via TriggerManualPayout. Distinct from
  // auto_pay_enabled (field 23) which controls MEMBER-side auto-debit.
  bool auto_payout_enabled = 32;
}

// Member assigned to a contribution
message ContributionMemberMessage {
  string id = 1;
  string contribution_id = 2;
  string user_id = 3;
  string user_name = 4;
  string email = 5;
  string profile_image = 6;
  google.protobuf.Timestamp joined_at = 7;
  uint64 total_paid = 8;
  uint64 expected_amount = 9;
  bool has_paid_current_cycle = 10;
  // Cumulative completed payments since the current cycle started.
  // Lets ROSCA + allow_partial_payments members spread the per-cycle
  // share across multiple smaller payments. Reset to 0 on cycle
  // advance. Always 0 for one-time contributions.
  uint64 cycle_paid_amount = 11;
  // Surfaces missed_cycles to clients without a separate fetch — the
  // dashboard "Missed cycles" column reads this directly.
  uint32 missed_cycles = 12;
  // Invite-first membership state. Values:
  //   "active"         — fully participating member.
  //   "pending_invite" — shadow row; user has been invited but not
  //                       yet accepted the parent group invite.
  //                       Excluded from financial logic.
  //   "declined"       — invitee declined; row kept for audit only.
  string membership_status = 13;
  // Linked GroupInvitation row (when membership_status is
  // 'pending_invite'). Empty for active members. Lets the dashboard
  // and Flutter UI surface "Invite Sent" with a one-tap deep link
  // to the invite detail.
  string linked_invitation_id = 14;
}

message ContributionPaymentMessage {
  string id = 1;
  string contribution_id = 2;
  string group_id = 3;
  string user_id = 4;
  string user_name = 5;
  uint64 amount = 6;
  string currency = 7;
  google.protobuf.Timestamp payment_date = 8;
  PaymentStatus status = 9;
  string transaction_id = 10;
  string receipt_id = 11;
  string notes = 12;
  string metadata = 13;
}

message PayoutScheduleMessage {
  string id = 1;
  string user_id = 2;
  string user_name = 3;
  int32 position = 4;
  google.protobuf.Timestamp scheduled_date = 5;
  uint64 expected_amount = 6;
  PayoutStatus status = 7;
  google.protobuf.Timestamp received_date = 8;
  uint64 actual_amount = 9;
  string notes = 10;
  string contribution_id = 11;
  string group_id = 12;
  int32 attempts = 13;
  google.protobuf.Timestamp last_attempt_at = 14;
  google.protobuf.Timestamp next_attempt_at = 15;
  string failure_reason = 16;
  int64 version = 17;
  string payout_transaction_id = 18;
}

message PayoutTransactionMessage {
  string id = 1;
  string contribution_id = 2;
  string group_id = 3;
  string recipient_user_id = 4;
  string recipient_user_name = 5;
  uint64 amount = 6;
  string currency = 7;
  google.protobuf.Timestamp payout_date = 8;
  PayoutTransactionStatus status = 9;
  string transaction_id = 10;
  string payment_method = 11;
  string failure_reason = 12;
  string metadata = 13;
}

message ContributionReceiptMessage {
  string id = 1;
  string payment_id = 2;
  string contribution_id = 3;
  string group_id = 4;
  string user_id = 5;
  string user_name = 6;
  uint64 amount = 7;
  string currency = 8;
  google.protobuf.Timestamp payment_date = 9;
  google.protobuf.Timestamp generated_at = 10;
  string receipt_number = 11;
  string receipt_data = 12;
}

message ContributionTranscriptMessage {
  string id = 1;
  string contribution_id = 2;
  string group_id = 3;
  google.protobuf.Timestamp generated_at = 4;
  repeated ContributionPaymentMessage payments = 5;
  uint64 total_amount = 6;
  string currency = 7;
  string member_contributions = 8;
}

// ============================================================================
// PAYOUT RECEIVER + SCHEDULED-PAYOUT MESSAGES
//
// The receiver/scheduler feature has its own message types (rather than
// piggybacking on PayoutScheduleMessage) so the wire format reflects the
// new state machine cleanly. PayoutScheduleMessage stays for ROSCA
// rotation accounting; ScheduledPayoutMessage is the dispatch-state
// row.
// ============================================================================

enum ScheduledPayoutStatus {
  SCHEDULED_PAYOUT_STATUS_UNSPECIFIED = 0;
  SCHEDULED_PAYOUT_STATUS_PENDING_RECEIVER = 1;
  SCHEDULED_PAYOUT_STATUS_READY = 2;
  SCHEDULED_PAYOUT_STATUS_SCHEDULED = 3;
  SCHEDULED_PAYOUT_STATUS_IN_FLIGHT = 4;
  SCHEDULED_PAYOUT_STATUS_SETTLED = 5;
  SCHEDULED_PAYOUT_STATUS_FAILED = 6;
  SCHEDULED_PAYOUT_STATUS_EXHAUSTED = 7;
  SCHEDULED_PAYOUT_STATUS_CANCELED = 8;
}

enum PayoutMode {
  PAYOUT_MODE_UNSPECIFIED = 0;
  PAYOUT_MODE_AUTO = 1;
  PAYOUT_MODE_MANUAL = 2;
}

message PayoutReceiverMessage {
  string id = 1;
  string contribution_id = 2;
  int32 cycle_index = 3;
  string recipient_user_id = 4;
  string recipient_account_id = 5;
  string recipient_name = 6;
  string recipient_username = 7;
  string assigned_by_user_id = 8;
  google.protobuf.Timestamp assigned_at = 9;
  google.protobuf.Timestamp cleared_at = 10;
  string note = 11;
}

message ScheduledPayoutMessage {
  string id = 1;
  string contribution_id = 2;
  int32 cycle_index = 3;
  ScheduledPayoutStatus status = 4;
  google.protobuf.Timestamp scheduled_for = 5;
  PayoutMode payout_mode = 6;
  string contribution_type = 7;
  uint64 amount_minor = 8;
  string currency = 9;
  string recipient_user_id = 10;
  string recipient_account_id = 11;
  string recipient_name = 12;
  string idempotency_key = 13;
  int32 attempts = 14;
  google.protobuf.Timestamp last_attempted_at = 15;
  string last_error = 16;
  google.protobuf.Timestamp fired_at = 17;
  google.protobuf.Timestamp settled_at = 18;
  string payout_transaction_id = 19;
  int64 version = 20;
  google.protobuf.Timestamp created_at = 21;
  google.protobuf.Timestamp updated_at = 22;
}

message PayoutEventMessage {
  string id = 1;
  string payout_id = 2;
  string contribution_id = 3;
  int32 cycle_index = 4;
  string event_type = 5;
  string payload = 6;       // JSON
  string actor_user_id = 7;
  google.protobuf.Timestamp occurred_at = 8;
}

message SetPayoutReceiverRequest {
  string contribution_id = 1;
  int32 cycle_index = 2;
  string recipient_user_id = 3;
  string recipient_account_id = 4;
  string note = 5;
}

message SetPayoutReceiverResponse {
  PayoutReceiverMessage receiver = 1;
  ScheduledPayoutMessage scheduled_payout = 2;
}

message GetPayoutReceiverRequest {
  string contribution_id = 1;
  int32 cycle_index = 2;
}

message GetPayoutReceiverResponse {
  PayoutReceiverMessage receiver = 1;
  ScheduledPayoutMessage scheduled_payout = 2;
}

message ClearPayoutReceiverRequest {
  string contribution_id = 1;
  int32 cycle_index = 2;
}

message ClearPayoutReceiverResponse {
  bool cleared = 1;
  ScheduledPayoutMessage scheduled_payout = 2;
}

message TriggerManualPayoutRequest {
  string contribution_id = 1;
  int32 cycle_index = 2;
}

message TriggerManualPayoutResponse {
  ScheduledPayoutMessage scheduled_payout = 1;
}

message ListScheduledPayoutsRequest {
  string contribution_id = 1;        // optional filter
  string group_id = 2;               // optional filter
  repeated ScheduledPayoutStatus statuses = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListScheduledPayoutsResponse {
  repeated ScheduledPayoutMessage payouts = 1;
  int32 total = 2;
}

message GetScheduledPayoutRequest {
  string payout_id = 1;
}

message GetScheduledPayoutResponse {
  ScheduledPayoutMessage payout = 1;
  PayoutReceiverMessage receiver = 2;
  repeated PayoutEventMessage events = 3;
}

