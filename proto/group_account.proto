}

message GetGroupMembersRequest {
  string group_id = 1;
}

message GetGroupMembersResponse {
  repeated GroupMemberMessage members = 1;
}

message AddMemberRequest {
  string group_id = 1;
  string user_id = 2;
  GroupMemberRole role = 3;
  string email = 4;
  string phone_number = 5;
  string lookup_username = 6;
}

message AddMemberResponse {
  GroupMemberMessage member = 1;
}

message UpdateMemberRoleRequest {
  string group_id = 1;
  string member_id = 2;
  GroupMemberRole new_role = 3;
}

message UpdateMemberRoleResponse {
  GroupMemberMessage member = 1;
}

message RemoveMemberRequest {
  string group_id = 1;
  string member_id = 2;
}

message RemoveMemberResponse {
  bool success = 1;
}

message SearchUsersRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchUsersResponse {
  repeated GroupMemberMessage users = 1;
}

message CreateContributionRequest {
  string group_id = 1;
  string title = 2;
  string description = 3;
  uint64 target_amount = 4;
  string currency = 5;
  google.protobuf.Timestamp deadline = 6;
  ContributionType type = 7;
  ContributionFrequency frequency = 8;
  uint64 regular_amount = 9;
  google.protobuf.Timestamp start_date = 10;
  int32 total_cycles = 11;
  repeated string member_rotation_order = 12;  // UUID strings for member rotation
  bool auto_pay_enabled = 13;
  uint64 penalty_amount = 14;
  int32 grace_period_days = 15;
  bool allow_partial_payments = 16;
  uint64 minimum_balance = 17;
  string metadata = 18;  // JSON string for external links (whatsapp, telegram) etc
  // Drives the payout scheduler: when true, the platform fires the
  // payout automatically once a receiver is set. When false, the
  // creator must press the manual-trigger CTA.
  bool auto_payout_enabled = 19;
}

message CreateContributionResponse {
  ContributionMessage contribution = 1;
}

message GetContributionRequest {
  string contribution_id = 1;
}

message GetContributionResponse {
  ContributionMessage contribution = 1;
}

message ListGroupContributionsRequest {
  string group_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string status = 4;
}

message ListGroupContributionsResponse {
  repeated ContributionMessage contributions = 1;
  ContributionPaginationInfo pagination = 2;
}

message UpdateContributionRequest {
  string contribution_id = 1;
  string title = 2;
  string description = 3;
  uint64 target_amount = 4;
  google.protobuf.Timestamp deadline = 5;
  ContributionStatus status = 6;
  string metadata = 7;  // JSON string for external links (whatsapp, telegram) etc
  // Optional toggle. Wrapped in a oneof-style explicit "set" flag so
  // a caller that omits the field doesn't accidentally flip it to
  // false. The handler treats auto_payout_enabled_set=false as
  // "leave the existing value alone".
  bool auto_payout_enabled = 8;
  bool auto_payout_enabled_set = 9;
}

message UpdateContributionResponse {
  ContributionMessage contribution = 1;
}

message DeleteContributionRequest {
  string contribution_id = 1;
}

message DeleteContributionResponse {
  bool success = 1;
}

message AddMembersToContributionRequest {
  string contribution_id = 1;
  repeated string member_user_ids = 2;
}

message AddMembersToContributionResponse {
  ContributionMessage contribution = 1;
  repeated ContributionMemberMessage added_members = 2;
}

// =====================================================================
// Invite-first membership (migration 015)
// =====================================================================

message GroupInvitationMessage {
  string id = 1;
  string group_id = 2;
  string invitee_user_id = 3;
  string inviter_user_id = 4;
  string role = 5;          // admin | moderator | member | viewer
  string status = 6;        // pending | accepted | declined | cancelled | expired
  google.protobuf.Timestamp invited_at = 7;
  google.protobuf.Timestamp decided_at = 8;
  google.protobuf.Timestamp expires_at = 9;
  string message = 10;
  // Denormalised group-side fields populated by ListMyInvitations
  // so the Flutter Invites tab can render the card without a follow-up
  // group fetch. Empty when not loaded by the caller.
  string group_name = 11;
  string group_description = 12;
  string inviter_name = 13;
}

message InviteToGroupRequest {
  string group_id = 1;
  string invitee_user_id = 2;
  string role = 3;     // optional; defaults to 'member'
  string message = 4;  // optional invite copy
}

message InviteToGroupResponse {
  GroupInvitationMessage invitation = 1;
}

message RespondToGroupInviteRequest {
  string invitation_id = 1;
  bool accept = 2;
}

message RespondToGroupInviteResponse {
  GroupInvitationMessage invitation = 1;
}

message CancelGroupInviteRequest {
  string invitation_id = 1;
}

message CancelGroupInviteResponse {
  bool success = 1;
}

message ListMyInvitationsRequest {
  // Optional status filter. Empty means "all non-soft-deleted".
  // Use ["pending"] to drive the badge / tab count.
  repeated string statuses = 1;
  uint32 limit = 2;
}

message ListMyInvitationsResponse {
  repeated GroupInvitationMessage invitations = 1;
}

message ListGroupInvitationsRequest {
  string group_id = 1;
  repeated string statuses = 2;
  uint32 limit = 3;
}

message ListGroupInvitationsResponse {
  repeated GroupInvitationMessage invitations = 1;
}

message RemoveMemberFromContributionRequest {
  string contribution_id = 1;
  string member_user_id = 2;
}

message RemoveMemberFromContributionResponse {
  bool success = 1;
  // Saga disposition. Lets the dashboard show a one-line summary
  // ("Refunded ₦X · Forfeited ₦Y · …") without re-fetching the row.
  // amounts in MINOR units (kobo).
  uint64 refund_amount = 2;
  uint64 forfeited_amount = 3;
  string refund_status = 4;   // MemberRefundStatus enum value
  string removal_reason = 5;  // human-readable saga decision label
}

// Hard-deletes a contribution_members shadow row in a TERMINAL
// state (declined / expired / cancelled invite). Required to
// re-invite a user after they've previously declined: the existing
// declined shadow row blocks AddMembersToContribution's
// duplicate-detection. Active rows are NEVER touched by this RPC —
// removing a real member still goes through RemoveMemberFromContribution
// with its full refund saga.
message RemoveContributionShadowRequest {
  string contribution_id = 1;
  string member_user_id = 2;
}

message RemoveContributionShadowResponse {
  bool success = 1;
  int32 removed_count = 2;
}

// PreviewMemberExit lets the caller see the refund / forfeit
// breakdown BEFORE actually triggering the exit. Used by Flutter +
// admin to render a confirmation dialog. The values returned reflect
// the live state at preview time; if the cycle advances or further
// payments land between preview and exit, the saga recomputes.
message PreviewMemberExitRequest {
  string contribution_id = 1;
  string member_user_id = 2;
}

message PreviewMemberExitResponse {
  // True if exit is allowed right now. False means the contribution
  // is in a terminal state that blocks exits (e.g. one-time settled).
  bool exit_allowed = 1;
  // Reason for the blocked state when exit_allowed = false.
  string blocked_reason = 2;
  // Saga decision label that would apply.
  string removal_reason = 3;
  // Refund and forfeit amounts in MINOR units (kobo).
  uint64 refund_amount = 4;
  uint64 forfeited_amount = 5;
  // Currency for the amounts above.
  string currency = 6;
  // True if the member has already received a payout in this
  // contribution (their share is settled). Drives copy on the
  // confirmation dialog.
  bool member_has_received_payout = 7;
  // For ROSCA: cycle index used to compute the refund window.
  // 0 for one-time / non-applicable.
  uint32 current_cycle = 8;
}

message GetContributionMembersRequest {
  string contribution_id = 1;
}

message GetContributionMembersResponse {
  repeated ContributionMemberMessage members = 1;
}

message MakePaymentRequest {
  string contribution_id = 1;
  uint64 amount = 2;
  string notes = 3;
  string source_account_id = 4;
  string transaction_pin = 5;
  string idempotency_key = 6;
}

message MakePaymentResponse {
  ContributionPaymentMessage payment = 1;
}

message GetContributionPaymentsRequest {
  string contribution_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetContributionPaymentsResponse {
  repeated ContributionPaymentMessage payments = 1;
  PaymentPaginationInfo pagination = 2;
}

message UpdatePaymentStatusRequest {
  string payment_id = 1;
  PaymentStatus status = 2;
  string transaction_id = 3;
}

message UpdatePaymentStatusResponse {
  ContributionPaymentMessage payment = 1;
}

message ProcessScheduledPaymentsRequest {
  string contribution_id = 1;
}

message ProcessScheduledPaymentsResponse {
  ContributionMessage contribution = 1;
  repeated ContributionPaymentMessage payments_processed = 2;
}

message GetPayoutScheduleRequest {
  string contribution_id = 1;
}

message GetPayoutScheduleResponse {
  repeated PayoutScheduleMessage schedule = 1;
}

message ProcessPayoutRequest {
  string contribution_id = 1;
}

message ProcessPayoutResponse {
  PayoutTransactionMessage transaction = 1;
}

message UpdatePayoutStatusRequest {
  string payout_id = 1;
  PayoutTransactionStatus status = 2;
  string transaction_id = 3;
  string failure_reason = 4;
}

message UpdatePayoutStatusResponse {
  PayoutTransactionMessage payout = 1;
}

message AdvancePayoutRotationRequest {
  string contribution_id = 1;
}

message AdvancePayoutRotationResponse {
  ContributionMessage contribution = 1;
}

message GenerateReceiptRequest {
  string payment_id = 1;
}

message GenerateReceiptResponse {
  ContributionReceiptMessage receipt = 1;
}

message GetUserContributionReceiptsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message GetUserContributionReceiptsResponse {
  repeated ContributionReceiptMessage receipts = 1;
  ReceiptPaginationInfo pagination = 2;
}

message GenerateTranscriptRequest {
  string contribution_id = 1;
}

message GenerateTranscriptResponse {
  ContributionTranscriptMessage transcript = 1;
}

// =============================================================
// Cycle history messages.
// =============================================================

// ContributionCycleSummary is one row in the history list. Status
// is the lifecycle string ("in_progress" | "closed_settled" |
// "closed_failed" | "closed_cancelled"). Amounts are MINOR units
// (kobo for NGN) — same convention used elsewhere in this proto.
message ContributionCycleSummary {
  string id = 1;
  string contribution_id = 2;
  int32 cycle_index = 3;
  string status = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp ended_at = 6;          // null while in_progress
  uint64 target_amount = 7;
  uint64 raised_amount = 8;
  uint64 deficit_amount = 9;
  string payout_transaction_id = 10;               // empty for one-time / failed
  string receiver_user_id = 11;
  string receiver_name = 12;
  int32 payment_count = 13;
  int32 members_count = 14;
  int32 pending_members_count = 15;
  int32 partial_members_count = 16;
  string close_reason = 17;
  string currency = 18;
}

// ContributionCycleMemberSnapshot is the per-member, per-cycle
// frozen record. Shown on the cycle-details bottom sheet's Members
// tab. status_at_close mirrors contribution_members.membership_status
// at the moment the cycle closed.
message ContributionCycleMemberSnapshot {
  string user_id = 1;
  string user_name = 2;
  string email = 3;
  uint64 expected_amount = 4;
  uint64 paid_amount = 5;
  bool has_paid = 6;
  bool was_receiver = 7;
  int32 missed_cycles_at_close = 8;
  string status_at_close = 9;
  google.protobuf.Timestamp joined_at = 10;
}

// ContributionCycleDetails = the full bottom-sheet payload. Bundles
// the summary + snapshot members + payments scoped to that cycle so
// the UI does ONE round-trip to populate every tab.
message ContributionCycleDetails {
  ContributionCycleSummary summary = 1;
  repeated ContributionCycleMemberSnapshot members = 2;
  repeated ContributionPaymentMessage payments = 3;
}

message ListContributionCyclesRequest {
  string contribution_id = 1;
  // When true, the live (in_progress) cycle is included in the
  // response; the history screen renders it pinned at the top with
  // a "Live" pill. Most flows want this on.
  bool include_in_progress = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListContributionCyclesResponse {
  repeated ContributionCycleSummary cycles = 1;
  int32 total_count = 2;
  int32 current_page = 3;
  int32 total_pages = 4;
  int32 items_per_page = 5;
}

message GetContributionCycleDetailsRequest {
  string contribution_id = 1;
  // 0 selects the live cycle (matches the contribution's current
  // current_cycle pointer). Any positive value pulls a frozen
  // historical row.
  int32 cycle_index = 2;
}

message GetContributionCycleDetailsResponse {
  ContributionCycleDetails details = 1;
}

// RestartContribution closes the current cycle of a one-time
// contribution and opens a fresh one with the same members and
// settings. Used after a one-time goal is reached so the group can
// keep saving toward a new target without losing the roster. Admin
// only. ROSCA contributions auto-rotate via advancePayoutRotationCore
// and don't go through this RPC.
message RestartContributionRequest {
  string contribution_id = 1;
  // Optional new target for the next cycle. 0 keeps the existing
  // target_amount.
  uint64 new_target_amount = 2;
  // Optional new deadline. Empty keeps the existing deadline.
  google.protobuf.Timestamp new_deadline = 3;
  string reason = 4;
}

message RestartContributionResponse {
  ContributionMessage contribution = 1;
  int32 cycles_completed = 2;
  int32 new_current_cycle = 3;
}

// ContributionMessage = a single chat message in a per-contribution
// chat. Kind is one of: "text", "voice", "image". Text messages
// carry body; voice/image carry media_url and (for voice) duration_ms.
message ContributionMessageProto {
  string id = 1;
  string contribution_id = 2;
  string sender_id = 3;
  string sender_name = 4;
  string kind = 5;        // text | voice | image
  string body = 6;        // text content (text kind only)
  string media_url = 7;   // CDN/asset URL (voice/image)
  int32 duration_ms = 8;  // voice note duration
  string created_at = 9;  // RFC3339
}

message SendContributionMessageRequest {
  string contribution_id = 1;
  string kind = 2;        // text | voice | image
  string body = 3;
  string media_url = 4;
  int32 duration_ms = 5;
}

message SendContributionMessageResponse {
  ContributionMessageProto message = 1;
}

message ListContributionMessagesRequest {
  string contribution_id = 1;
  string since_rfc3339 = 2; // optional: only return messages newer than this
  int32 limit = 3;          // default 100, max 500
}

message ListContributionMessagesResponse {
  repeated ContributionMessageProto messages = 1;
}

message GetGroupStatisticsRequest {
  string group_id = 1;
}

message GetGroupStatisticsResponse {
  int32 member_count = 1;
  int32 total_contributions = 2;
  int32 completed_contributions = 3;
  int32 active_contributions = 4;
  uint64 total_target_amount = 5;
  uint64 total_current_amount = 6;
  double completion_rate = 7;
}

message GetUserContributionStatsRequest {}

message GetUserContributionStatsResponse {
  int32 total_payments = 1;
  uint64 total_amount = 2;
  int32 groups_count = 3;
  double average_payment = 4;
}

message GetOverdueContributionsRequest {}

message GetOverdueContributionsResponse {
  repeated ContributionMessage contributions = 1;
}

message GetContributionAnalyticsRequest {
  string contribution_id = 1;
}

message GetContributionAnalyticsResponse {
  string contribution_id = 1;
  string type = 2;
  double progress_percentage = 3;
  int32 total_payments = 4;
  double average_payment = 5;
  uint64 current_amount = 6;
  uint64 target_amount = 7;

  message MemberParticipation {
    int32 total_members = 1;
    int32 participating_members = 2;
    double participation_rate = 3;
  }
  MemberParticipation member_participation = 8;

  message Schedule {
    bool is_on_schedule = 1;
    int32 days_behind_schedule = 2;
    google.protobuf.Timestamp next_payment_date = 3;
    int32 current_cycle = 4;
    int32 total_cycles = 5;
  }
  Schedule schedule = 9;

  message Payout {
    string current_recipient = 1;
    google.protobuf.Timestamp next_payout_date = 2;
    int32 completed_payouts = 3;
    int32 pending_payouts = 4;
  }
  Payout payout = 10;

  string member_stats = 11;
}

// ============================================================================
// PUBLIC GROUP DISCOVERY MESSAGES
// ============================================================================

message ListPublicGroupsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string sort_by = 3;       // "most_members", "most_raised", "newest", "trending"
  string search_query = 4;  // Optional text search
}

message ListPublicGroupsResponse {
  repeated GroupAccountMessage groups = 1;
  GroupPaginationInfo pagination = 2;
}

message GetPublicGroupRequest {
  string group_id = 1;
}

message PublicGroupContributor {
  string user_id = 1;
  string display_name = 2;
  string profile_image = 3;
  uint64 total_contributed = 4;
  int32 contribution_count = 5;
}

message GetPublicGroupResponse {
  GroupAccountMessage group = 1;
  GetGroupStatisticsResponse statistics = 2;
  repeated PublicGroupContributor top_contributors = 3;
  bool is_member = 4;
}

message JoinPublicGroupRequest {
  string group_id = 1;
}

message JoinPublicGroupResponse {
  GroupMemberMessage member = 1;
  GroupAccountMessage group = 2;
  string message = 3;
}

