syntax = "proto3";

package auth;

option go_package = "auth-service/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// PinChannelType represents the banking channel for PIN operations
enum PinChannelType {
  PIN_CHANNEL_APP = 0;        // Flutter mobile app (default)
  PIN_CHANNEL_WHATSAPP = 1;   // WhatsApp banking
  PIN_CHANNEL_TELEPHONY = 2;  // Phone calls and SMS banking
}

// TransactionPinService handles transaction PIN operations
service TransactionPinService {
  // CreateTransactionPin creates a new transaction PIN for a user
  rpc CreateTransactionPin(CreateTransactionPinRequest) returns (CreateTransactionPinResponse);

  // VerifyTransactionPin verifies a PIN before processing a payment
  rpc VerifyTransactionPin(VerifyTransactionPinRequest) returns (VerifyTransactionPinResponse);

  // ChangeTransactionPin changes an existing PIN
  rpc ChangeTransactionPin(ChangeTransactionPinRequest) returns (ChangeTransactionPinResponse);

  // ResetTransactionPin resets a PIN with proper verification
  rpc ResetTransactionPin(ResetTransactionPinRequest) returns (ResetTransactionPinResponse);

  // CheckUserHasPin checks if a user has a transaction PIN set up
  rpc CheckUserHasPin(CheckUserHasPinRequest) returns (CheckUserHasPinResponse);

  // ValidateTransactionPinToken validates a token issued after PIN verification
  rpc ValidateTransactionPinToken(ValidateTransactionPinTokenRequest) returns (ValidateTransactionPinTokenResponse);

  // InitiatePinOTP sends a 6-digit OTP code via email or SMS for PIN operations
  rpc InitiatePinOTP(InitiatePinOTPRequest) returns (InitiatePinOTPResponse);

  // VerifyPinOTP verifies the OTP and executes the PIN operation (create/change)
  rpc VerifyPinOTP(VerifyPinOTPRequest) returns (VerifyPinOTPResponse);

  // GetPinOTPChannels returns available OTP delivery channels for the user
  rpc GetPinOTPChannels(GetPinOTPChannelsRequest) returns (GetPinOTPChannelsResponse);

  // CompleteForgotPin verifies OTP and resets the PIN (forgot PIN flow)
  rpc CompleteForgotPin(CompleteForgotPinRequest) returns (CompleteForgotPinResponse);

  // GetUserChannelPins returns PIN setup status for all channels
  rpc GetUserChannelPins(GetUserChannelPinsRequest) returns (GetUserChannelPinsResponse);

  // CreateChannelRegistration registers a user for a banking channel
  rpc CreateChannelRegistration(CreateChannelRegistrationRequest) returns (CreateChannelRegistrationResponse);

  // VerifyChannelOTP verifies OTP for channel registration
  rpc VerifyChannelOTP(VerifyChannelOTPRequest) returns (VerifyChannelOTPResponse);

  // GetChannelRegistrations gets all channel registrations for a user
  rpc GetChannelRegistrations(GetChannelRegistrationsRequest) returns (GetChannelRegistrationsResponse);

  // DeactivateChannel deactivates a banking channel
  rpc DeactivateChannel(DeactivateChannelRequest) returns (DeactivateChannelResponse);

  // ResolvePhoneToUser resolves a phone number to a user ID (service-to-service)
  rpc ResolvePhoneToUser(ResolvePhoneToUserRequest) returns (ResolvePhoneToUserResponse);
}

// CreateTransactionPinRequest creates a new PIN
message CreateTransactionPinRequest {
  string user_id = 1;
  string pin = 2;
  string confirm_pin = 3;
  string device_id = 4;
  string device_name = 5;
  PinChannelType channel_type = 6;
}

message CreateTransactionPinResponse {
  bool success = 1;
  string message = 2;
  TransactionPinDetails pin_details = 3;
}

// VerifyTransactionPinRequest verifies a PIN before payment
message VerifyTransactionPinRequest {
  string user_id = 1;
  string pin = 2;
  string transaction_id = 3;
  string transaction_type = 4; // transfer, bill_payment, purchase, etc.
  double amount = 5;
  string currency = 6;
  string device_id = 7;
  PinChannelType channel_type = 8;
}

message VerifyTransactionPinResponse {
  bool success = 1;
  string message = 2;
  string verification_token = 3; // Token to use for actual payment execution
  google.protobuf.Timestamp expires_at = 4;
  int32 remaining_attempts = 5;
  bool is_locked = 6;
}

// ChangeTransactionPinRequest changes an existing PIN
message ChangeTransactionPinRequest {
  string user_id = 1;
  string current_pin = 2;
  string new_pin = 3;
  string confirm_new_pin = 4;
  PinChannelType channel_type = 5;
}

message ChangeTransactionPinResponse {
  bool success = 1;
  string message = 2;
}

// ResetTransactionPinRequest resets a forgotten PIN
message ResetTransactionPinRequest {
  string user_id = 1;
  string verification_method = 2; // email, sms, biometric, security_questions
  string verification_code = 3;
  string new_pin = 4;
  string confirm_new_pin = 5;
  PinChannelType channel_type = 6;
}

message ResetTransactionPinResponse {
  bool success = 1;
  string message = 2;
}

// CheckUserHasPinRequest checks if user has PIN setup
message CheckUserHasPinRequest {
  string user_id = 1;
  PinChannelType channel_type = 2;
}

message CheckUserHasPinResponse {
  bool has_pin = 1;
  bool is_active = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp last_changed_at = 4;
}

// ValidateTransactionPinTokenRequest validates a verification token
message ValidateTransactionPinTokenRequest {
  string token = 1;
  string user_id = 2;
  string transaction_id = 3;
}

message ValidateTransactionPinTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string transaction_id = 3;
  google.protobuf.Timestamp expires_at = 4;
}

// TransactionPinDetails contains PIN metadata
message TransactionPinDetails {
  string id = 1;
  string user_id = 2;
  bool is_active = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  google.protobuf.Timestamp last_used_at = 6;
  int32 failed_attempts = 7;
  bool is_locked = 8;
  google.protobuf.Timestamp locked_until = 9;
  PinChannelType channel_type = 10;
}

// InitiatePinOTP request - sends OTP for PIN create/change/reset
message InitiatePinOTPRequest {
  string user_id = 1;
  string operation_type = 2; // "create", "change", "reset"
  string channel = 3; // "email", "sms", or "auto"
  string device_id = 4;
}

message InitiatePinOTPResponse {
  bool success = 1;
  string message = 2;
  string channel = 3; // actual channel used
  string masked_destination = 4; // "jo***@example.com" or "+44***6789"
  int32 expires_in_seconds = 5;
  int32 cooldown_seconds = 6;
}

// VerifyPinOTP request - verifies OTP and executes PIN operation
message VerifyPinOTPRequest {
  string user_id = 1;
  string otp_code = 2;
  string operation_type = 3; // "create" or "change"
  string current_pin = 4; // only for "change"
  string new_pin = 5;
  string confirm_new_pin = 6;
  string device_id = 7;
  string device_name = 8;
  PinChannelType channel_type = 9;
}

message VerifyPinOTPResponse {
  bool success = 1;
  string message = 2;
  int32 remaining_attempts = 3;
}

// GetPinOTPChannels - returns available OTP channels
message GetPinOTPChannelsRequest {
  string user_id = 1;
}

message GetPinOTPChannelsResponse {
  repeated OTPChannel channels = 1;
  string recommended_channel = 2;
}

message OTPChannel {
  string type = 1; // "email" or "sms"
  string masked_destination = 2;
  bool is_verified = 3;
  bool is_available = 4;
}

// CompleteForgotPin - verifies OTP and resets PIN
message CompleteForgotPinRequest {
  string user_id = 1;
  string otp_code = 2;
  string new_pin = 3;
  string confirm_new_pin = 4;
  string device_id = 5;
  PinChannelType channel_type = 6;
}

message CompleteForgotPinResponse {
  bool success = 1;
  string message = 2;
  int32 remaining_attempts = 3;
}

// PIN configuration constants
message PinConfig {
  int32 min_length = 1;
  int32 max_length = 2;
  int32 max_attempts = 3;
  int32 lockout_duration_minutes = 4;
  int32 token_expiry_minutes = 5;
}

// GetUserChannelPins - returns PIN status for all channels
message GetUserChannelPinsRequest {
  string user_id = 1;
}

message GetUserChannelPinsResponse {
  repeated ChannelPinStatus channel_pins = 1;
}

message ChannelPinStatus {
  PinChannelType channel_type = 1;
  bool has_pin = 2;
  bool is_active = 3;
  bool is_locked = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp last_used_at = 6;
}

// CreateChannelRegistration
message CreateChannelRegistrationRequest {
  string user_id = 1;
  string channel_type = 2; // "whatsapp" or "telephony"
  string phone_number = 3; // E.164 format
}

message CreateChannelRegistrationResponse {
  bool success = 1;
  string message = 2;
  string masked_phone = 3;
  int32 otp_expires_in_seconds = 4;
}

// VerifyChannelOTP
message VerifyChannelOTPRequest {
  string user_id = 1;
  string channel_type = 2;
  string otp_code = 3;
}

message VerifyChannelOTPResponse {
  bool success = 1;
  string message = 2;
  ChannelRegistrationDetails registration = 3;
}

// GetChannelRegistrations
message GetChannelRegistrationsRequest {
  string user_id = 1;
}

message GetChannelRegistrationsResponse {
  repeated ChannelRegistrationDetails registrations = 1;
}

message ChannelRegistrationDetails {
  string id = 1;
  string user_id = 2;
  string channel_type = 3;
  string phone_number = 4; // masked: +234***5678
  string status = 5; // pending, active, suspended, deactivated
  bool has_pin = 6;
  google.protobuf.Timestamp activated_at = 7;
  google.protobuf.Timestamp created_at = 8;
}

// DeactivateChannel
message DeactivateChannelRequest {
  string user_id = 1;
  string channel_type = 2;
}

message DeactivateChannelResponse {
  bool success = 1;
  string message = 2;
}

// ResolvePhoneToUser - service-to-service only
message ResolvePhoneToUserRequest {
  string phone_number = 1; // E.164 format
  string channel_type = 2; // "whatsapp" or "telephony"
}

message ResolvePhoneToUserResponse {
  bool found = 1;
  string user_id = 2;
  string channel_status = 3; // active, suspended, etc.
  bool has_pin = 4;
}
