message IntlAirtimeCountry {
  string id = 1;
  string country_code = 2;
  string country_name = 3;
  string dial_code = 4;
  string currency_code = 5;
  string currency_symbol = 6;
  string flag_emoji = 7;
  bool is_active = 8;
  bool reloadly_supported = 9;
  bool vtpass_supported = 10;
  int32 operator_count = 11;
}

message IntlAirtimeOperator {
  string id = 1;
  string country_code = 2;
  string country_name = 3;
  string operator_name = 4;
  string reloadly_operator_id = 5;
  string vtpass_operator_id = 6;
  // "RANGE" or "FIXED"
  string denomination_type = 7;
  string sender_currency_code = 8;
  string dest_currency_code = 9;
  double fx_rate = 10;
  double min_amount = 11;
  double max_amount = 12;
  double local_min_amount = 13;
  double local_max_amount = 14;
  // JSON arrays of numbers (sender currency)
  string fixed_amounts = 15;
  // JSON arrays of numbers (dest currency)
  string local_fixed_amounts = 16;
  bool supports_local_amounts = 17;
  string logo_url = 18;
  bool is_active = 19;
}

message GetIntlAirtimeCountriesRequest {
  // If true, return all countries (admin); if false, only is_active=true (user)
  bool include_inactive = 1;
}

message GetIntlAirtimeCountriesResponse {
  repeated IntlAirtimeCountry countries = 1;
}

message GetIntlAirtimeOperatorsRequest {
  string country_code = 1;
}

message GetIntlAirtimeOperatorsResponse {
  repeated IntlAirtimeOperator operators = 1;
  string country_name = 2;
  string currency_code = 3;
  string currency_symbol = 4;
}

message AutoDetectIntlOperatorRequest {
  string phone_number = 1;
  string country_code = 2;
}

message AutoDetectIntlOperatorResponse {
  IntlAirtimeOperator operator = 1;
  bool detected = 2;
  string message = 3;
}

message BuyIntlAirtimeRequest {
  string account_id = 1;
  string idempotency_key = 2;
  string operator_id = 3;         // IntlAirtimeOperator.id (UUID)
  string country_code = 4;
  string phone_number = 5;        // Recipient phone number (with country dial code)
  double amount = 6;              // Amount in sender_currency (e.g., NGN)
  string sender_currency = 7;     // e.g., "NGN"
  // For FIXED operators: the exact denomination in dest currency
  double use_local_amount = 8;    // >0 means use this dest-currency amount
  // FX snapshot from operator info (to display on receipt)
  double fx_rate_snapshot = 9;
  string dest_currency = 10;
  double dest_amount_estimate = 11;
  string transaction_pin = 12;
}

message BuyIntlAirtimeResponse {
  string payment_id = 1;
  string reference = 2;
  string status = 3;              // "completed", "processing", "failed"
  double amount_paid = 4;
  string sender_currency = 5;
  double delivered_amount = 6;    // What the recipient actually got
  string delivered_currency = 7;
  double fx_rate_used = 8;
  string operator_name = 9;
  string country_name = 10;
  string phone_number = 11;
  string message = 12;
  string created_at = 13;
}

// ==== INTERNATIONAL DATA BUNDLES MESSAGES ====
// Structure mirrors IntlAirtimeOperator / BuyIntlAirtimeRequest so
// Flutter/admin clients can reuse existing widgets with minimal changes.

// IntlDataBundle represents one purchasable data plan on an operator.
// Reloadly has no discrete bundles endpoint — bundles are fixed amounts
// on operators with `data==true`, so this message flattens
// FixedAmounts + descriptions into a UI-renderable shape.
message IntlDataBundle {
  // UUID we assign at cache time (stable across price changes)
  string id = 1;
  string operator_id = 2;                 // References IntlDataOperator.id
  double amount = 3;                       // Sender-currency amount
  double local_amount = 4;                 // Destination-currency amount
  string description = 5;                  // "1GB 30 Days" etc.
  string dest_currency_code = 6;
  string sender_currency_code = 7;
  double fx_rate = 8;
}

message IntlDataOperator {
  string id = 1;
  string country_code = 2;
  string country_name = 3;
  string operator_name = 4;
  string reloadly_operator_id = 5;
  string sender_currency_code = 6;
  string dest_currency_code = 7;
  double fx_rate = 8;
  string logo_url = 9;
  bool is_active = 10;
  int32 bundle_count = 11;                 // Number of bundles available
}

message GetIntlDataOperatorsRequest {
  string country_code = 1;
}

message GetIntlDataOperatorsResponse {
  repeated IntlDataOperator operators = 1;
  string country_name = 2;
  string currency_code = 3;
  string currency_symbol = 4;
}

message GetIntlDataBundlesRequest {
  string operator_id = 1;
}

message GetIntlDataBundlesResponse {
  repeated IntlDataBundle bundles = 1;
  IntlDataOperator operator = 2;
}

message BuyIntlDataRequest {
  string account_id = 1;
  string idempotency_key = 2;
  string operator_id = 3;
  string bundle_id = 4;                    // IntlDataBundle.id
  string country_code = 5;
  string phone_number = 6;                 // With country dial code
  double amount = 7;                       // Sender currency amount
  string sender_currency = 8;
  double dest_amount = 9;                  // What gets delivered
  string dest_currency = 10;
  double fx_rate_snapshot = 11;
  string transaction_pin = 12;
}

message BuyIntlDataResponse {
  string payment_id = 1;
  string reference = 2;
  string status = 3;
  double amount_paid = 4;
  string sender_currency = 5;
  double delivered_amount = 6;
  string delivered_currency = 7;
  double fx_rate_used = 8;
  string operator_name = 9;
  string country_name = 10;
  string phone_number = 11;
  string bundle_description = 12;
  string message = 13;
  string created_at = 14;
}

