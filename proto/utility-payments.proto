// ===== SUBSCRIPTION TRACKING =====

message ActiveSubscription {
  string id = 1;
  string subscription_type = 2;       // data, cable_tv, internet, electricity, airtime
  string provider_id = 3;
  string provider_name = 4;
  string plan_name = 5;
  double amount = 6;
  string currency = 7;
  string customer_number = 8;
  string status = 9;                   // active, expired, cancelled
  string purchased_at = 10;
  string expires_at = 11;             // Empty for non-expiring
  int32 validity_days = 12;
  string renewal_date = 13;
  string token = 14;                   // Electricity token
  double units = 15;                   // Electricity units
  double progress_percentage = 16;     // 0-100 (time elapsed %)
  int32 days_remaining = 17;           // -1 for non-expiring
  string payment_reference = 18;

  // Auto-renewal fields (non-expiring data)
  bool auto_renew_enabled = 19;
  string auto_renew_variation_id = 20;
  string auto_renew_network = 21;
  double auto_renew_amount = 22;
  int32 renewal_attempts = 23;
  string next_renewal_at = 24;          // ISO timestamp
  string auto_renew_disabled_reason = 25;
}

message GetActiveSubscriptionsRequest {
  string subscription_type = 1;        // Optional filter
  int32 limit = 2;
  int32 offset = 3;
}

message GetActiveSubscriptionsResponse {
  repeated ActiveSubscription subscriptions = 1;
  int32 total = 2;
}

message SubscriptionTypeSummary {
  string type = 1;
  int32 count = 2;
  double total_spend = 3;
}

message GetSubscriptionSummaryRequest {}

