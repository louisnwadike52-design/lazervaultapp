}

// ===== DATA BUNDLES (eBills Africa) =====

message DataPlan {
  string variation_id = 1;
  string name = 2;                    // e.g., "1.5GB - 30 Days"
  double price = 3;
  string network = 4;                 // "mtn", "airtel", "glo", "9mobile"
  string availability = 5;
  // Server-computed platform service fee (NGN) based on admin
  // system_settings (data_service_fee_enabled / data_fee_type /
  // data_fee_percentage / data_fee_fixed). Always ADDED to price on
  // the confirmation screen — never subtracted. Zero when the fee
  // toggle is off. Clients MUST display price + service_fee = total
  // rather than showing service_fee inside the plan price.
  double service_fee = 6;
}

message GetDataPlansRequest {
  string network = 1;                 // Required: "mtn", "airtel", "glo", "9mobile"
}

message GetDataPlansResponse {
  repeated DataPlan plans = 1;
  int32 total = 2;
}

// NOTE: user_id extracted from JWT token, not from request
message BuyDataRequest {
  string phone_number = 1;
  string network = 2;                 // "mtn", "airtel", "glo", "9mobile"
  string variation_id = 3;            // eBills variation_id from GetDataPlans
  double amount = 4;                  // Expected price (validated against plan price)

  // Transaction PIN verification
  string transaction_id = 5;
  string verification_token = 6;

  // Idempotency
  string idempotency_key = 7;
  string country_code = 8;            // "NG" default
}

message BuyDataResponse {
  BillPayment payment = 1;
  double new_balance = 2;
  string phone_number = 3;
  string data_plan = 4;               // Human-readable plan name
  string message = 5;
  double commission_earned = 6;
  string provider_reference = 7;
}

